apiVersion: v1
kind: Pod
metadata:
  name: node-wide-device-opt-in
  annotations:
    nvml-mock.nvidia.com/devices: "true"
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: ubuntu
      image: ubuntu:22.04
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          echo "[node-wide-device-opt-in] checking explicit device injection"
          test -d /opt/nvml-mock
          command -v nvidia-smi
          test -c /dev/nvidia0
          ls -l /dev/nvidia0
          echo "[node-wide-device-opt-in] device opt-in OK"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
