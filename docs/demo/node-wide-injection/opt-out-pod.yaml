apiVersion: v1
kind: Pod
metadata:
  name: node-wide-opt-out
  annotations:
    nvml-mock.nvidia.com/inject: "false"
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: ubuntu
      image: ubuntu:22.04
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          echo "[node-wide-opt-out] checking opt-out disables injection"
          if test -e /opt/nvml-mock; then
            echo "unexpected /opt/nvml-mock overlay" >&2
            exit 1
          fi
          if command -v nvidia-smi >/dev/null 2>&1; then
            echo "unexpected nvidia-smi in PATH" >&2
            exit 1
          fi
          echo "[node-wide-opt-out] opt-out OK"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
