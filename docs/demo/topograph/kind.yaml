# Kind topology for the topograph demo: one control-plane plus four workers,
# arranged as two NVLink cliques of two nodes each (see clique-topology.yaml).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
  - role: worker
  - role: worker
  - role: worker
