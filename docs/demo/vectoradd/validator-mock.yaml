#
# GPU Operator Validator pod for E2E testing with nvml-mock chart.
# Runs cuda-vectorAdd against the mock libcuda.so to verify the CUDA mock
# supports basic kernel launch.
#
# This is a standalone Job (not the full operator validator) that exercises
# the same validation the GPU Operator performs.
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-validator-mock
  namespace: default
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 60
  template:
    metadata:
      labels:
        name: gpu-validator-mock
    spec:
      restartPolicy: Never
      tolerations:
        - operator: Exists
      containers:
        - name: cuda-validation
          image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0
          imagePullPolicy: IfNotPresent
          env:
            - name: LD_LIBRARY_PATH
              value: "/var/lib/nvml-mock/driver/usr/lib64"
            # Force-load the mock driver before main() so it can install its
            # CUDA runtime-API interposition (the vectoradd-cuda12.5.0 sample
            # links the CUDA runtime statically and never dlopens libcuda early
            # enough otherwise).
            - name: LD_PRELOAD
              value: "/var/lib/nvml-mock/driver/usr/lib64/libcuda.so.1"
          volumeMounts:
            - name: mock-root
              mountPath: /var/lib/nvml-mock
              readOnly: true
          resources:
            limits:
              nvidia.com/gpu: "1"
      volumes:
        - name: mock-root
          hostPath:
            path: /var/lib/nvml-mock
