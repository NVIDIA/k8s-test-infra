#
# Applied by run.sh during the "push" phase, after the pci-15b3 NFD label is
# faked onto the workers. Enables only the RDMA shared device plugin: a
# lightweight component that would read /sys/class/infiniband to advertise
# rdma/* resources. On Kind it crash-loops at startup with "can not get RDMA
# subsystem network namespace mode": it needs a real RDMA kernel subsystem
# (rdma netlink) that Kind's kernel does not expose, so it never reaches device
# enumeration. (It also runs in the NRI-excluded operator namespace and is a
# static Go binary, so it would not see the pod-only mock fabric regardless.)
# The OFED/DOCA driver is intentionally omitted: it builds kernel modules,
# which Kind's shared kernel cannot support.
#
# repository/image/version below are the chart defaults for network-operator
# v26.4.0 (image tag tracks the operator release; see run.sh notes).
apiVersion: mellanox.com/v1alpha1
kind: NicClusterPolicy
metadata:
  name: nic-cluster-policy
spec:
  rdmaSharedDevicePlugin:
    repository: nvcr.io/nvidia/mellanox
    image: k8s-rdma-shared-dev-plugin
    version: network-operator-v26.4.0
    config: |
      {
        "configList": [
          {
            "resourceName": "rdma_shared_device_a",
            "rdmaHcaMax": 63,
            "selectors": { "vendors": ["15b3"] }
          }
        ]
      }
