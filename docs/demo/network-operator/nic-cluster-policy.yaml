#
# Applied by run.sh during the "push" phase. Enables the RDMA shared device
# plugin, which reads the RDMA subsystem to advertise rdma/* resources.
#
# On Linux, run.sh first sets up Soft-RoCE (rdma_rxe) via soft-roce.yaml, which
# creates a real software RDMA device rxe0 over each node's eth0. The selector
# below matches that device by its netdev (ifNames: eth0) — NOT by vendor,
# because rxe is generic software RDMA, not a 15b3 Mellanox NIC. With rxe
# present the plugin enumerates the device and advertises
# rdma/rdma_shared_device_a. On non-Linux hosts run.sh skips Soft-RoCE and the
# plugin stays blocked (no RDMA kernel subsystem).
#
# The OFED/DOCA driver is intentionally omitted: it builds kernel modules,
# which Kind's shared kernel cannot support.
#
# repository/image/version below are the chart defaults for network-operator
# v26.4.0 (image tag tracks the operator release; see run.sh notes).
apiVersion: mellanox.com/v1alpha1
kind: NicClusterPolicy
metadata:
  name: nic-cluster-policy
spec:
  rdmaSharedDevicePlugin:
    repository: nvcr.io/nvidia/mellanox
    image: k8s-rdma-shared-dev-plugin
    version: network-operator-v26.4.0
    config: |
      {
        "configList": [
          {
            "resourceName": "rdma_shared_device_a",
            "rdmaHcaMax": 63,
            "selectors": { "ifNames": ["eth0"] }
          }
        ]
      }
