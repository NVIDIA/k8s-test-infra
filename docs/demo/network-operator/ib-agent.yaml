#
# ib-agent is an ordinary workload: no nvidia.com/gpu request, no hostPath
# mounts, no LD_PRELOAD/MOCK_* env. It ships the real InfiniBand userspace
# tools (as any RDMA app image would); the mock fabric those tools read is
# injected by the nvml-mock NRI plugin at container creation.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ib-agent
  labels:
    app: ib-agent
spec:
  selector:
    matchLabels:
      app: ib-agent
  template:
    metadata:
      labels:
        app: ib-agent
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: agent
          image: debian:bookworm-slim
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "[ib-agent] node=${NODE_NAME} installing IB userspace tools"
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                infiniband-diags ibverbs-utils ibverbs-providers >/dev/null
              echo "=== ibstat -l (mock HCAs via NRI) ==="
              ibstat -l
              echo "=== ibv_devinfo -l (libibverbs enumeration via NRI) ==="
              ibv_devinfo -l
              echo "[ib-agent] mock RDMA fabric visible via NRI; entering loop"
              while true; do ibstat -l; sleep 300; done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          # Gate readiness on the IB tools being installed AND able to load the
          # NRI-injected mock fabric. Without this the pod reports Ready the
          # instant the shell starts — before `apt-get install` finishes — and
          # any `kubectl exec ibstat` races the install and fails to load libs.
          readinessProbe:
            exec:
              command: ["ibstat", "-l"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 36
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
