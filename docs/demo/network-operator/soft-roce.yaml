#
# Soft-RoCE (rdma_rxe) setup for the network-operator demo. The real
# rdma-shared-device-plugin needs a live RDMA kernel subsystem (NETLINK_RDMA)
# which Kind's kernel does not expose. rxe registers a *real software* RDMA
# device over an existing netdev, so the plugin enumerates a device and
# advertises rdma/*. LINUX ONLY: the host kernel must provide rdma_rxe
# (run.sh loads it and sets the netns mode before applying this manifest).
#
# The pod runs hostNetwork, so eth0 is the node's kube netdev and rxe0 is
# created in that node's net namespace (rdma netns mode = exclusive).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: soft-roce-setup
  labels:
    app: soft-roce-setup
spec:
  selector:
    matchLabels:
      app: soft-roce-setup
  template:
    metadata:
      labels:
        app: soft-roce-setup
    spec:
      automountServiceAccountToken: false
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: rxe
          image: alpine:3.20
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: RXE_NETDEV
              value: eth0
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "[soft-roce] node=${NODE_NAME} installing tools"
              apk add --no-cache iproute2-rdma kmod >/dev/null 2>&1 || \
                apk add --no-cache iproute2-rdma kmod
              # Best-effort: run.sh already loaded rdma_rxe on the host and set
              # netns mode. Re-assert idempotently in case it did not.
              modprobe rdma_rxe 2>/dev/null || \
                echo "[soft-roce] WARN: modprobe rdma_rxe failed (host module missing?)"
              if ! rdma system 2>/dev/null | grep -q "netns exclusive"; then
                rdma system set netns exclusive 2>/dev/null || \
                  echo "[soft-roce] WARN: could not set netns exclusive (may already have links)"
              fi
              if rdma link show rxe0 >/dev/null 2>&1; then
                echo "[soft-roce] rxe0 already present"
              else
                rdma link add rxe0 type rxe netdev "${RXE_NETDEV}" || \
                  echo "[soft-roce] WARN: rdma link add failed on ${RXE_NETDEV}"
              fi
              echo "=== rdma link show ==="
              rdma link show 2>&1 || true
              # Stay Ready so the demo proceeds and can report the outcome.
              echo "[soft-roce] setup done; sleeping"
              while true; do sleep 3600; done
          readinessProbe:
            exec:
              command: ["sh", "-c", "rdma link show rxe0 >/dev/null 2>&1"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          volumeMounts:
            - name: host-lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: host-sys
              mountPath: /sys
      volumes:
        - name: host-lib-modules
          hostPath:
            path: /lib/modules
        - name: host-sys
          hostPath:
            path: /sys
