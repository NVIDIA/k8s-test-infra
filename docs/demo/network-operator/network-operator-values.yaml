#
# Values for the NVIDIA Network Operator Helm chart (nvidia/network-operator),
# tuned for a Kind test cluster used by docs/demo/network-operator/run.sh.
#
# - Bundled NFD is enabled so the operator's node-selection machinery is
#   present (it still won't detect the mock NICs, which is the point).
# - The SR-IOV network operator is disabled: it manages real VFs and only
#   adds noise on Kind.
# - No NicClusterPolicy is auto-created here; run.sh applies
#   nic-cluster-policy.yaml explicitly during the "push" phase.
nfd:
  enabled: true
sriovNetworkOperator:
  enabled: false
