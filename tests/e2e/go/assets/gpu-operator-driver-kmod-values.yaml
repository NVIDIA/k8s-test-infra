#
# Managed-driver DELTA that turns on the PREBUILT stub kernel module
# (MOCK_KMOD=on) for real, kernel-global /proc/driver/nvidia and
# /sys/module/nvidia. This file is EMBEDDED by tests/e2e/go/assets/assets.go
# and layered by the Go `gpu-operator-driver` scenario's mock-kmod leg on top
# of BOTH the baseline and the managed-driver delta (later -f wins per key;
# the driver.env list is replaced wholesale, so all three vars are repeated
# here).
#
# The scenario is responsible for staging the prebuilt module at
# /run/nvidia/mock-kmod/nvidia.ko on the node before the driver pod starts --
# the mock-driver entrypoint never compiles it. See docs/mock-driver.md.
#
# Using a dedicated overlay (rather than `--set driver.env[N].value`) keeps CI
# decoupled from the positional order of the driver.env list.
driver:
  env:
    - name: MOCK_GPU_PROFILE
      value: "a100"
    - name: MOCK_GPU_COUNT
      value: "2"
    - name: MOCK_KMOD
      value: "on"
