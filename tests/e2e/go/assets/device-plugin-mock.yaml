#
# Device plugin DaemonSet for E2E testing with nvml-mock chart.
# Expects nvml-mock chart to be installed first.
#
# No mock-specific env vars needed — the .so auto-discovers its config
# from /proc/self/maps and reads num_devices from the YAML.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-mock
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-mock
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-mock
    spec:
      # Only schedule where the nvml-mock chart actually installed the driver.
      # setup.sh labels those nodes nvidia.com/gpu.present=true; without this
      # the DaemonSet (which tolerates all taints) also lands on the multi-node
      # control-plane, where /var/lib/nvml-mock/driver is absent, so NVML init
      # fails with ERROR_LIBRARY_NOT_FOUND and the rollout never completes.
      # Single-node clusters label their control-plane too, so it still runs there.
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: nvidia-device-plugin
          image: nvcr.io/nvidia/k8s-device-plugin:v0.18.2
          args:
            - "--nvidia-driver-root=/var/lib/nvml-mock/driver"
            - "--driver-root-ctr-path=/var/lib/nvml-mock/driver"
            - "--device-discovery-strategy=nvml"
          securityContext:
            privileged: true
          volumeMounts:
            - name: mock-root
              mountPath: /var/lib/nvml-mock
              readOnly: true
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: mock-root
          hostPath:
            path: /var/lib/nvml-mock
        - name: device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
