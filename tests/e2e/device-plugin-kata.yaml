# Device plugin DaemonSet for the Kata E2E lane.
# Differs from device-plugin-mock.yaml in the allocation strategy — two
# args plus a /var/run/cdi volume for the generated spec: allocation uses
# --device-list-strategy=cdi-cri. The default envvar strategy relies on
# the NVIDIA container runtime rewriting the container config on the
# host — the kata runtime handler bypasses that wrapper entirely, so
# only CRI-native CDI injection (or kubelet DeviceSpecs) reaches kata
# pods. cdi-cri makes containerd apply the CDI spec before handing the
# OCI config to the kata shim.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-kata
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-kata
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-kata
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: nvidia-device-plugin
          image: nvcr.io/nvidia/k8s-device-plugin:v0.18.2
          args:
            - "--nvidia-driver-root=/var/lib/nvml-mock/driver"
            - "--driver-root-ctr-path=/var/lib/nvml-mock/driver"
            - "--device-discovery-strategy=nvml"
            - "--device-list-strategy=cdi-cri"
            - "--device-id-strategy=index"
          securityContext:
            privileged: true
          volumeMounts:
            - name: mock-root
              mountPath: /var/lib/nvml-mock
              readOnly: true
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
            - name: cdi-dir
              mountPath: /var/run/cdi
      volumes:
        - name: mock-root
          hostPath:
            path: /var/lib/nvml-mock
        - name: device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: cdi-dir
          hostPath:
            path: /var/run/cdi
