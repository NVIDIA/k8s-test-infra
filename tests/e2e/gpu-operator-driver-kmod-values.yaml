#
# Managed-driver DELTA that turns on the stub kernel module (MOCK_KMOD=on) for
# real, kernel-global /proc/driver/nvidia and /sys/module/nvidia. Layer it on
# top of BOTH the baseline and the managed-driver delta (later -f wins per
# key; the driver.env list is replaced wholesale, so all three vars are
# repeated here):
#
#   helm install gpu-operator nvidia/gpu-operator \
#     -f tests/e2e/gpu-operator-values.yaml \
#     -f tests/e2e/gpu-operator-driver-values.yaml \
#     -f tests/e2e/gpu-operator-driver-kmod-values.yaml
#
# Using a dedicated overlay (rather than `--set driver.env[N].value`) keeps CI
# decoupled from the positional order of the driver.env list.
driver:
  env:
    - name: MOCK_GPU_PROFILE
      value: "a100"
    - name: MOCK_GPU_COUNT
      value: "2"
    - name: MOCK_KMOD
      value: "on"
