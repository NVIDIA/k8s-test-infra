# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "gomod"
    target-branch: main
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    labels:
      - "kind/dependencies"
    groups:
      k8sio:
        patterns:
          - "k8s.io/*"
        exclude-patterns:
          - "k8s.io/klog/*"

  - package-ecosystem: "github-actions"
    target-branch: main
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "kind/dependencies"

  - package-ecosystem: "docker"
    target-branch: main
    directories:
      # Golang version
      - "/deployments/devel"
    schedule:
      interval: "daily"
    labels:
      - "kind/dependencies"

  - package-ecosystem: "npm"
    target-branch: main
    directory: "/.github/actions/repo-automation"
    schedule:
      interval: "weekly"
      day: "sunday"
    labels:
      - "kind/dependencies"
