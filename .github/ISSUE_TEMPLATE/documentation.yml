name: "Documentation request or correction"
description: "Report missing, outdated, or incorrect documentation."
title: "[Docs]: "
labels: ["kind/documentation", "needs-triage"]
body:
  - type: input
    id: location
    attributes:
      label: Location
      description: URL, file path, or section affected.
    validations: { required: true }
  - type: textarea
    id: issue
    attributes:
      label: What is wrong / missing
    validations: { required: true }
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested correction (optional)
