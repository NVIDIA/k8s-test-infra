name: Commands

on:
  issue_comment:
    types:
      - created

permissions: {}

jobs:
  commands:
    name: Commands
    if: ${{ github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: repository-automation-state
      cancel-in-progress: false
    permissions:
      contents: read
      actions: write
      issues: write
      pull-requests: write
    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          submodules: false

      - name: Execute repository command
        uses: ./.github/actions/repo-automation
        with:
          mode: command
          dry-run: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
