# Go/Ginkgo nvml-mock E2E. The harness under tests/e2e owns lifecycle (Kind
# create/teardown, image build/load, Helm, validation, diagnostics) behind one
# entrypoint (`make e2e`) that runs identically locally and here. Jobs mirror the
# legacy nvml-mock E2E workflow and select the related Go scenario by label.
#
# Image distribution: a single `build-image` job builds the nvml-mock image once
# and pushes it to the ephemeral, auth-free ttl.sh registry (works on fork PRs)
# as E2E_IMAGE (24h TTL). Every leg then pulls that image by digest (immune to
# tag overwrite on the anonymous registry), tags it to E2E_IMAGE, and the harness
# kind-loads it (E2E_SKIP_BUILD=true) instead of rebuilding per leg.
#
# Kind node image: the standalone `e2e` pilot uses `make cluster-create` (same
# as local dev), which needs a custom kind-node image with nvidia-container-
# toolkit pre-baked. A parallel `build-kind-node` job builds and pushes that
# image to ttl.sh once per commit; the standalone leg pulls by digest, retags
# to kind-node-nv:latest, and sets KIND_NODE_IMAGE_PREBUILT so `make image-
# kind-node` is a no-op. Same "build once, share via ttl.sh" pattern as
# nvml-mock. Other jobs still use kindest/node directly and don't need this.
name: nvml-mock E2E (Go)

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      gpu_profiles:
        required: false
        type: string
        default: '["a100", "h100", "b200", "gb200", "gb300", "t4"]'
      golang_version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      gpu_profiles:
        description: 'GPU profiles to test (JSON array)'
        required: false
        default: '["gb200"]'
        type: string
      golang_version:
        description: 'Go version to use (match go.mod / hack/golang-version.sh)'
        required: true
        type: string

env:
  GO_VERSION: ${{ inputs.golang_version }}
  KIND_VERSION: "v0.31.0"
  KIND_AMD64_SHA256: "eb244cbafcc157dff60cf68693c14c9a75c4e6e6fedaf9cd71c58117cb93e3fa"
  # Standalone `e2e` job only (pilot): pinned so Tilt version drift doesn't
  # silently change rollout semantics between runs. Bump alongside local dev.
  TILT_VERSION: "0.37.5"
  # Per-commit, ephemeral (24h TTL) ttl.sh ref the build-image job publishes and
  # every leg pulls (by digest, then tags locally to this ref for the harness).
  # Auth-free, so it also works on fork PRs. 24h (ttl.sh max) keeps the image
  # alive long enough to re-run individual failed legs without a full rebuild.
  E2E_IMAGE: ttl.sh/nvml-mock-${{ github.sha }}:24h
  E2E_SKIP_BUILD: "true"
  E2E_ARTIFACTS: ${{ github.workspace }}/artifacts/e2e/go

jobs:
  # Build nvml-mock once and publish to ttl.sh; all legs consume this artifact
  # instead of rebuilding the image per job (see issue #460).
  build-nvmlmock-image:
    runs-on: ubuntu-latest
    outputs:
      # Digest of the pushed image (sha256:...). Legs pull by digest so an
      # anonymous ttl.sh tag overwrite cannot substitute the image between
      # this push and their pulls.
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push nvml-mock image to ttl.sh
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: deployments/nvml-mock/Dockerfile
          tags: ${{ env.E2E_IMAGE }}
          push: true
          build-args: |
            GOLANG_VERSION=${{ env.GO_VERSION }}
          cache-from: type=gha,scope=nvml-mock
          cache-to: type=gha,mode=max,scope=nvml-mock

  # Build the custom kind-node image (kindest/node + nvidia-container-toolkit)
  # once per commit for the standalone `e2e` pilot. Same ttl.sh distribution
  # pattern as `build-image` above — the pilot leg pulls by digest and retags
  # locally to kind-node-nv:latest, then `make cluster-create` sees it and
  # skips the rebuild (KIND_NODE_IMAGE_PREBUILT=1 in the env). Runs in
  # parallel with `build-image`; independent scope on the GHA cache so the
  # two jobs don't contend for the same key.
  build-kind-node-image:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push kind-node image to ttl.sh
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./local/kind
          tags: ttl.sh/kind-node-nv-${{ github.sha }}:24h
          push: true
          cache-from: type=gha,scope=kind-node
          cache-to: type=gha,mode=max,scope=kind-node

  # TODO: The standalone `e2e` job uses `make cluster-create` +
  # `tilt ci` for the cluster provisioning and nvml-mock rollout, mirroring the
  # local-dev flow documented in local/README.md. Ginkgo runs in attach mode
  # (E2E_ATTACH_EXISTING=true) and only observes/asserts. If this pattern
  # holds up, the four other jobs (dra, gpu-operator, multi-node, nri) will
  # follow in a subsequent PR.
  e2e:
    needs: [build-nvmlmock-image, build-kind-node-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gpu-profile: ${{ fromJson(inputs.gpu_profiles) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Install Kind
        run: |
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64"
          echo "${{ env.KIND_AMD64_SHA256 }}  ./kind" | sha256sum --check
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install Tilt
        run: |
          curl -fsSL "https://github.com/tilt-dev/tilt/releases/download/v${TILT_VERSION}/tilt.${TILT_VERSION}.linux.x86_64.tar.gz" \
            | sudo tar -xzC /usr/local/bin tilt
          tilt version

      - name: Pull pre-built kind-node image from ttl.sh (pinned by digest)
        run: |
          # Same content-addressed pull pattern as nvml-mock: pin by digest so
          # anonymous ttl.sh tag overwrites cannot substitute a different image
          # between the build-kind-node push and this pull. Re-tag to the local
          # ref `make cluster-create` expects (kind-node-nv:latest).
          pinned="ttl.sh/kind-node-nv-${{ github.sha }}@${{ needs.build-kind-node.outputs.digest }}"
          docker pull "$pinned"
          docker tag "$pinned" kind-node-nv:latest

      - name: Create Kind cluster (make cluster-create)
        # Uses local/kind/default.kind.yaml (1 CP + 2 workers, a100 / t4). Same
        # command a laptop dev runs — cluster name is `gpu-test`, context is
        # kind-gpu-test. KIND_NODE_IMAGE_PREBUILT tells the Makefile to skip
        # the local `docker build` and trust the tag we just staged from ttl.sh.
        env:
          KIND_NODE_IMAGE_PREBUILT: "1"
        run: make cluster-create

      - name: Stage CI Helm values for Tilt
        # local/nvml-mock.values.local.yaml is the Tiltfile's "wins over
        # everything" overlay hook (nvml_mock.tiltfile:68). Copying our CI
        # tuning file there is how CI participates in the same values stack a
        # local dev's personal overrides use.
        run: cp tests/e2e/ci/nvml-mock.values.yaml local/nvml-mock.values.local.yaml

      - name: Roll out nvml-mock via Tilt (${{ matrix.gpu-profile }})
        # `tilt ci` runs the Tiltfile headless: waits for every resource to
        # become ready, then exits 0/1. --nvmlmock-image tells Tilt to skip
        # docker_build and pin image.repository/tag directly to the ttl.sh
        # ref the build-image job published. Kubelet inside kind pulls it
        # over the docker-bridge egress; ttl.sh is auth-free so no
        # `docker pull` / `kind load` dance is needed. The sha-scoped URL
        # (`ttl.sh/nvml-mock-<sha>:24h`) makes tag collisions effectively
        # impossible for this commit.
        run: tilt ci -- --gpu-profile="${{ matrix.gpu-profile }}" --nvmlmock-image="$E2E_IMAGE"

      - name: Run E2E (${{ matrix.gpu-profile }})
        # Attach mode: Ginkgo does NOT create a cluster, does NOT install helm,
        # does NOT kind-load; it just wires kube/helm clients to the existing
        # context and runs the standalone specs against Tilt's rollout.
        env:
          E2E_PROFILES: ${{ matrix.gpu-profile }}
          E2E_ATTACH_EXISTING: "true"
          E2E_KUBE_CONTEXT: kind-gpu-test
          E2E_CLUSTER_NAME: gpu-test
        run: make e2e

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "=== e2e diagnostics (${{ matrix.gpu-profile }}) ==="
          if [ -d "$E2E_ARTIFACTS" ]; then
            find "$E2E_ARTIFACTS" -type f | while read -r f; do
              echo "----- $f -----"; cat "$f"; echo;
            done
          else
            echo "no diagnostics written"
          fi

  e2e-dra:
    needs: build-nvmlmock-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gpu-profile: ${{ fromJson(inputs.gpu_profiles) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Pull pre-built nvml-mock image from ttl.sh (pinned by digest)
        run: |
          # Content-addressed pull: even if the sha-derived tag is overwritten on
          # the anonymous ttl.sh registry, the digest fetches exactly what
          # build-image pushed. Re-tag to E2E_IMAGE for the harness kind-load and
          # Helm repo:tag split.
          pinned="ttl.sh/nvml-mock-${{ github.sha }}@${{ needs.build-image.outputs.digest }}"
          docker pull "$pinned"
          docker tag "$pinned" "${{ env.E2E_IMAGE }}"

      - name: Install Kind
        run: |
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64"
          echo "${{ env.KIND_AMD64_SHA256 }}  ./kind" | sha256sum --check
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Run DRA E2E (${{ matrix.gpu-profile }})
        env:
          E2E_PROFILES: ${{ matrix.gpu-profile }}
        run: make e2e-dra

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "=== e2e-dra diagnostics (${{ matrix.gpu-profile }}) ==="
          if [ -d "$E2E_ARTIFACTS" ]; then
            find "$E2E_ARTIFACTS" -type f | while read -r f; do
              echo "----- $f -----"; cat "$f"; echo;
            done
          else
            echo "no diagnostics written"
          fi

  e2e-gpu-operator:
    needs: build-nvmlmock-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gpu-profile: ${{ fromJson(inputs.gpu_profiles) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Pull pre-built nvml-mock image from ttl.sh (pinned by digest)
        run: |
          # Content-addressed pull: even if the sha-derived tag is overwritten on
          # the anonymous ttl.sh registry, the digest fetches exactly what
          # build-image pushed. Re-tag to E2E_IMAGE for the harness kind-load and
          # Helm repo:tag split.
          pinned="ttl.sh/nvml-mock-${{ github.sha }}@${{ needs.build-image.outputs.digest }}"
          docker pull "$pinned"
          docker tag "$pinned" "${{ env.E2E_IMAGE }}"

      - name: Install Kind
        run: |
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64"
          echo "${{ env.KIND_AMD64_SHA256 }}  ./kind" | sha256sum --check
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Run GPU Operator E2E (${{ matrix.gpu-profile }})
        env:
          E2E_PROFILES: ${{ matrix.gpu-profile }}
        run: make e2e-gpu-operator

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "=== e2e-gpu-operator diagnostics (${{ matrix.gpu-profile }}) ==="
          if [ -d "$E2E_ARTIFACTS" ]; then
            find "$E2E_ARTIFACTS" -type f | while read -r f; do
              echo "----- $f -----"; cat "$f"; echo;
            done
          else
