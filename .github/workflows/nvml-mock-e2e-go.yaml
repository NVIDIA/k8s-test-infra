# Go/Ginkgo nvml-mock E2E — the Go port of docs/demo/standalone/demo.sh. The
# harness under tests/e2e owns the full lifecycle (Kind create/teardown, image
# build/load, Helm upgrade --install, validation, diagnostics) behind one
# entrypoint (`make e2e`) that runs identically locally and here. Each matrix
# leg stands up a SINGLE shared multi-node cluster (docs/demo/kind.yaml) and
# runs that profile's demo checks against it — including cross-node ibping,
# since the demo cluster has 3 workers.
#
# Image distribution: each leg builds nvml-mock:e2e once via buildx with the
# GitHub Actions layer cache (no registry dependency -> works on fork PRs),
# then the harness kind-loads it (E2E_SKIP_BUILD=true).
name: nvml-mock E2E (Go)

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      golang_version:
        required: true
        type: string
      gpu_profiles:
        required: false
        type: string
        default: '["a100", "h100", "b200", "gb200", "gb300", "t4"]'
      kind_version:
        required: false
        type: string
        default: 'v0.31.0'
  workflow_dispatch:
    inputs:
      golang_version:
        description: 'Go version (leave empty to use the project version)'
        required: false
        type: string
      gpu_profiles:
        description: 'GPU profiles to test (JSON array)'
        required: false
        default: '["gb200"]'
        type: string
      kind_version:
        description: 'Kind version'
        required: false
        default: 'v0.31.0'
        type: string

env:
  E2E_IMAGE: nvml-mock:e2e
  E2E_SKIP_BUILD: "true"
  E2E_ARTIFACTS: ${{ github.workspace }}/artifacts/e2e

jobs:
  # One leg per GPU profile. Each leg stands up a single shared multi-node
  # cluster and runs that profile's demo checks (nvidia-smi, NVLink, IB, PCI
  # sysfs, profile ConfigMaps, cross-node ibping) against it.
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gpu-profile: ${{ fromJson(inputs.gpu_profiles) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Detect Go version
        id: go-version
        run: echo "version=$(./hack/golang-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.golang_version || steps.go-version.outputs.version }}

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build nvml-mock image (buildx + GHA cache)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: deployments/nvml-mock/Dockerfile
          tags: ${{ env.E2E_IMAGE }}
          load: true
          build-args: |
            GOLANG_VERSION=${{ inputs.golang_version || steps.go-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Kind
        run: |
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${{ inputs.kind_version }}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Run E2E (${{ matrix.gpu-profile }})
        env:
          E2E_PROFILES: ${{ matrix.gpu-profile }}
        run: make e2e

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "=== e2e diagnostics (${{ matrix.gpu-profile }}) ==="
          if [ -d "$E2E_ARTIFACTS" ]; then
            find "$E2E_ARTIFACTS" -type f | while read -r f; do
              echo "----- $f -----"; cat "$f"; echo;
            done
          else
            echo "no diagnostics written"
          fi
