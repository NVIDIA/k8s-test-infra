name: helm Publish

permissions: {}

on:
  workflow_run:
    workflows: ["helm"]
    types: [completed]
    branches: [main]

concurrency:
  group: helm-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CHART_NAME: nvml-mock
  CHART_DIR: deployments/nvml-mock/helm

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # needed for keyless cosign signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Read chart version
        id: chart
        run: |
          version=$(helm show chart ${{ env.CHART_DIR }}/${{ env.CHART_NAME }} | grep '^version:' | awk '{print $2}')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package ${{ env.CHART_DIR }}/${{ env.CHART_NAME }} --destination .cr-release-packages

      # ghcr intermittently 404s the tag operation right after a fresh
      # manifest upload ("failed to perform Tag ...: not found"), leaving an
      # untagged package version behind; a short retry finds the
      # already-uploaded manifest and tags it.
      - name: Push chart to OCI registry
        id: push
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            if helm push .cr-release-packages/${{ env.CHART_NAME }}-${{ steps.chart.outputs.version }}.tgz \
              oci://ghcr.io/nvidia/k8s-test-infra/chart 2>&1 | tee push.log; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "helm push failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "helm push attempt ${attempt} failed; retrying in 10s" >&2
            sleep 10
          done
          digest=$(awk '/^Digest:/ {print $2}' push.log)
          if [ -z "${digest}" ]; then
            echo "could not extract chart digest from helm push output" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # cosign reads registry credentials from the Docker config, which
      # `helm registry login` does not write; without this login the
      # signature blob upload is rejected with UNAUTHORIZED.
      - name: Log in to GHCR for cosign
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign OCI artifact
        run: |
          cosign sign --yes \
            ghcr.io/nvidia/k8s-test-infra/chart/${{ env.CHART_NAME }}@${{ steps.push.outputs.digest }}
