name: Backport

on:
  pull_request_target:
    types:
      - closed
      - labeled

permissions: {}

jobs:
  backport:
    name: Backport
    if: ${{ github.event.pull_request.merged == true && (github.event.action == 'closed' || startsWith(github.event.label.name, 'cherry-pick/')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: backport-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          submodules: false

      - name: Execute backport
        uses: ./.github/actions/repo-automation
        with:
          mode: backport
          pr-number: ${{ github.event.pull_request.number }}
          dry-run: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
