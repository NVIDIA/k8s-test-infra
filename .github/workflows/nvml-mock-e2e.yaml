name: nvml-mock E2E

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      golang_version:
        required: true
        type: string
      gpu_profiles:
        required: false
        type: string
        # Include the NVSwitch/fabric profiles (gb200, gb300) and the
        # standalone B200 negative control so the #371 NVLink/fabricmanager
        # acceptance criteria are actually exercised in normal CI.
        default: '["a100", "h100", "b200", "gb200", "gb300", "t4"]'
  workflow_dispatch:
    inputs:
      golang_version:
        description: 'Go version'
        required: true
        # Canonical version comes from hack/golang-version.sh; keep this default in sync.
        default: '1.26.4'
        type: string
      gpu_profiles:
        description: 'GPU profiles to test (JSON array)'
        required: false
        default: '["a100", "h100", "b200", "gb200", "gb300", "l40s", "t4"]'
        type: string

jobs:
  e2e-device-plugin:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gpu-profile: ${{ fromJson(inputs.gpu_profiles) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve profile facts (display name + GPU count)
        id: gpu-info
        run: |
          PROFILE_FILE="deployments/nvml-mock/helm/nvml-mock/profiles/${{ matrix.gpu-profile }}.yaml"
          NAME=$(awk -F'"' '/^  name:/{print $2; exit}' "$PROFILE_FILE")
          if [ -z "$NAME" ]; then
            echo "FAIL: could not derive GPU name from $PROFILE_FILE"; exit 1
          fi
          COUNT=$(awk '/^devices:/{f=1;next} /^[^[:space:]]/{f=0} f&&/^[[:space:]]*-[[:space:]]*index:/{c++} END{print c+0}' "$PROFILE_FILE")
          if [ -z "$COUNT" ] || [ "$COUNT" -lt 1 ]; then
            echo "FAIL: could not derive GPU count from $PROFILE_FILE"; exit 1
          fi
          echo "gpu-name=$NAME" >> "$GITHUB_OUTPUT"
          echo "gpu-count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Resolved profile '${{ matrix.gpu-profile }}': name='$NAME', $COUNT GPUs"

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ inputs.golang_version }}

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: nvml-mock-e2e-${{ matrix.gpu-profile }}

      - name: Build nvml-mock image
        run: |
          docker build -t nvml-mock:e2e -f deployments/nvml-mock/Dockerfile \
            --build-arg GOLANG_VERSION=${{ inputs.golang_version }} .

      - name: Load image into Kind
        run: |
          kind load docker-image nvml-mock:e2e --name nvml-mock-e2e-${{ matrix.gpu-profile }}

      - name: Install nvml-mock Helm chart
        run: |
          helm install nvml-mock deployments/nvml-mock/helm/nvml-mock \
            --set image.repository=nvml-mock \
            --set image.tag=e2e \
            --set gpu.profile=${{ matrix.gpu-profile }} \
            --wait --timeout 120s

      - name: Verify DaemonSet is ready
        run: |
          kubectl rollout status daemonset/nvml-mock --timeout=60s

      - name: Verify node labels
        run: |
          NODE=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')
          LABEL=$(kubectl get node "$NODE" -o jsonpath='{.metadata.labels.nvidia\.com/gpu\.present}')
          echo "nvidia.com/gpu.present=$LABEL"
          [ "$LABEL" = "true" ] || (echo "FAIL: node label not set" && exit 1)

      - name: Verify mock files on node
        run: |
          NODE_CONTAINER=nvml-mock-e2e-${{ matrix.gpu-profile }}-control-plane
          # Check library
          docker exec "$NODE_CONTAINER" sh -c "ls /var/lib/nvml-mock/driver/usr/lib64/libnvidia-ml.so.* | head -1"
          docker exec "$NODE_CONTAINER" test -L /var/lib/nvml-mock/driver/usr/lib64/libnvidia-ml.so.1
          # Check device files (under driver root so the upstream DRA driver's
          # getDevRoot() resolves; CDI bind-mounts these to /dev/nvidia* in pods)
          docker exec "$NODE_CONTAINER" test -e /var/lib/nvml-mock/driver/dev/nvidia0
          docker exec "$NODE_CONTAINER" test -e /var/lib/nvml-mock/driver/dev/nvidia1
          docker exec "$NODE_CONTAINER" test -e /var/lib/nvml-mock/driver/dev/nvidiactl
          # Check config at both locations
          docker exec "$NODE_CONTAINER" test -f /var/lib/nvml-mock/config/config.yaml
          docker exec "$NODE_CONTAINER" test -f /var/lib/nvml-mock/driver/config/config.yaml
          # Verify num_devices was injected (profile-derived count)
          docker exec "$NODE_CONTAINER" grep -q "num_devices: ${{ steps.gpu-info.outputs.gpu-count }}" /var/lib/nvml-mock/config/config.yaml
          echo "All mock files verified"

      - name: Validate nvidia-smi output
        run: |
          ./tests/e2e/validate-nvidia-smi.sh \
            nvml-mock-e2e-${{ matrix.gpu-profile }}-control-plane \
            "${{ steps.gpu-info.outputs.gpu-name }}" \
            ${{ steps.gpu-info.outputs.gpu-count }}

      - name: Verify fake fabricmanager readiness
        run: |
          # Fabric-manager enablement is derived by the chart from the profile
          # (nvlink.switches / device_defaults.fabric.state: auto) and surfaced
          # as the MOCK_FABRICMANAGER env on the daemonset. Read it back from
          # the deployed resource rather than restating a per-profile list here,
          # then skip the readiness probe for profiles that never start it.
          FM=$(kubectl get daemonset nvml-mock \
            -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="MOCK_FABRICMANAGER")].value}' 2>/dev/null || true)
          if [ "$FM" != "on" ]; then
            echo "fabricmanager not enabled for profile '${{ matrix.gpu-profile }}' — skipping readiness check"
            exit 0
          fi
          POD=$(kubectl get pods -l app.kubernetes.io/name=nvml-mock \
            -o jsonpath='{.items[0].metadata.name}')
          # The fake nvidia-fabricmanager daemon writes a node-local readiness
          # marker; nv-fabricmanager-ctl -q reports READY once it exists.
          # Verify readiness BEFORE asserting NVLink topology: on a real
          # HGX/GB200 node the fabric (and thus the NV# links) is gated on
          # fabricmanager registration completing.
          for i in $(seq 1 15); do
            if kubectl exec "$POD" -- /usr/bin/nv-fabricmanager-ctl -q 2>/dev/null | grep -q READY; then
              echo "PASS: fake fabricmanager reports READY"
              exit 0
            fi
            echo "Attempt $i: fabricmanager not ready yet, waiting..."
            sleep 2
          done
          echo "FAIL: fake fabricmanager did not report READY"
          kubectl logs "$POD" --tail=30 || true
          exit 1

      - name: Validate NVLink topology (nvidia-smi topo -m)
        run: |
          ./tests/e2e/validate-nvlink.sh \
            nvml-mock-e2e-${{ matrix.gpu-profile }}-control-plane \
            "${{ matrix.gpu-profile }}" \
            ${{ steps.gpu-info.outputs.gpu-count }}

      - name: Validate ibstat / ibstatus (InfiniBand mock)
        run: |
          POD=$(kubectl get pods -l app.kubernetes.io/name=nvml-mock \
            -o jsonpath='{.items[0].metadata.name}')
          # Profiles ship hcas_per_gpu=1, so IB-enabled profiles expose one HCA
          # per GPU — i.e. the profile-derived GPU count.
          ./tests/e2e/validate-ibstat.sh "$POD" "${{ matrix.gpu-profile }}" ${{ steps.gpu-info.outputs.gpu-count }}

      - name: Validate ibv_devinfo (InfiniBand mock)
        run: |
          POD=$(kubectl get pods -l app.kubernetes.io/name=nvml-mock \
            -o jsonpath='{.items[0].metadata.name}')
          ./tests/e2e/validate-ibv-devinfo.sh "$POD" "${{ matrix.gpu-profile }}" ${{ steps.gpu-info.outputs.gpu-count }}

      - name: Deploy NVIDIA device plugin
        run: |
          kubectl apply -f tests/e2e/device-plugin-mock.yaml
          # Wait for the DaemonSet rollout before waiting on its pods: a bare
          # `kubectl wait pod -l ...` run immediately after apply fails with
          # "no matching resources found" if the DS controller hasn't created
          # the pod yet. rollout status tolerates that and blocks until ready.
          kubectl -n kube-system rollout status \
            daemonset/nvidia-device-plugin-mock --timeout=120s
          kubectl -n kube-system wait --for=condition=ready \
            pod -l name=nvidia-device-plugin-mock --timeout=120s

      - name: Verify allocatable GPUs
        run: |
          NODE=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')
          EXPECT=${{ steps.gpu-info.outputs.gpu-count }}
          # Wait for kubelet to update allocatable (may take a few seconds)
          for i in $(seq 1 30); do
            GPUS=$(kubectl get node "$NODE" -o jsonpath='{.status.allocatable.nvidia\.com/gpu}')
            if [ "$GPUS" = "$EXPECT" ]; then
              echo "PASS: Node reports $GPUS allocatable GPUs"
              exit 0
            fi
            echo "Attempt $i: allocatable GPUs=$GPUS (expected $EXPECT), waiting..."
            sleep 2
          done
          echo "FAIL: Expected $EXPECT allocatable GPUs, got $GPUS"
          exit 1

      # GFD and CUDA validator standalone images from nvcr.io may require NGC auth.
      # The GPU Operator path (e2e-gpu-operator job) bundles these publicly and works
      # without credentials. These standalone steps are disabled until verified public.
      # See tests/e2e/README.md for local testing instructions.
      - name: Deploy GPU Feature Discovery
        if: false
        run: |
          docker pull nvcr.io/nvidia/gpu-feature-discovery:v0.17.0
          kind load docker-image nvcr.io/nvidia/gpu-feature-discovery:v0.17.0 --name nvml-mock-e2e-${{ matrix.gpu-profile }}
          kubectl apply -f tests/e2e/gfd-mock.yaml
          kubectl -n kube-system wait --for=condition=ready \
            pod -l name=nvidia-gfd-mock --timeout=120s

      - name: Verify GFD node labels
        if: false
        run: |
          NODE=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')
          for i in $(seq 1 30); do
            PRODUCT=$(kubectl get node "$NODE" -o jsonpath='{.metadata.labels.nvidia\.com/gpu\.product}' 2>/dev/null || true)
            if [ -n "$PRODUCT" ]; then break; fi
            echo "Attempt $i: waiting for GFD labels..."
            sleep 2
          done
          echo "Checking GFD labels on node $NODE..."
          for LABEL in nvidia.com/gpu.product nvidia.com/gpu.memory nvidia.com/gpu.compute.major; do
            VALUE=$(kubectl get node "$NODE" -o json | jq -r ".metadata.labels[\"$LABEL\"] // empty")
            if [ -z "$VALUE" ]; then
              echo "FAIL: GFD label $LABEL not set"
              kubectl get node "$NODE" -o json | jq '.metadata.labels | to_entries[] | select(.key | startswith("nvidia.com"))' || true
              exit 1
            fi
            echo "  $LABEL=$VALUE"
          done
          echo "PASS: GFD labels verified"

      - name: Run CUDA validator job
        if: false
        run: |
          docker pull nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0
          kind load docker-image nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0 --name nvml-mock-e2e-${{ matrix.gpu-profile }}
          kubectl apply -f tests/e2e/validator-mock.yaml
          kubectl wait --for=condition=complete job/gpu-validator-mock --timeout=120s || {
            echo "Validator job did not complete. Checking status..."
            kubectl describe job/gpu-validator-mock
            kubectl logs -l name=gpu-validator-mock --tail=50 || true
            exit 1
          }
          echo "PASS: CUDA validator job completed successfully"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== nvml-mock pod logs ==="
          kubectl logs -l app.kubernetes.io/name=nvml-mock --tail=50 || true
          echo "=== device plugin logs ==="
          kubectl -n kube-system logs -l name=nvidia-device-plugin-mock --tail=50 || true
          echo "=== GFD logs ==="
          kubectl -n kube-system logs -l name=nvidia-gfd-mock --tail=50 || true
          echo "=== validator job logs ==="
          kubectl logs -l name=gpu-validator-mock --tail=50 || true
          echo "=== node labels ==="
          kubectl get nodes -o json | jq '.items[].metadata.labels | to_entries[] | select(.key | startswith("nvidia.com"))' || true
          echo "=== pod status ==="
          kubectl get pods -A || true
          echo "=== node describe ==="
          kubectl describe nodes || true

  e2e-dra:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gpu-profile: ${{ fromJson(inputs.gpu_profiles) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve profile facts (display name + GPU count)
        id: gpu-info
        run: |
          PROFILE_FILE="deployments/nvml-mock/helm/nvml-mock/profiles/${{ matrix.gpu-profile }}.yaml"
          NAME=$(awk -F'"' '/^  name:/{print $2; exit}' "$PROFILE_FILE")
          if [ -z "$NAME" ]; then
            echo "FAIL: could not derive GPU name from $PROFILE_FILE"; exit 1
          fi
          COUNT=$(awk '/^devices:/{f=1;next} /^[^[:space:]]/{f=0} f&&/^[[:space:]]*-[[:space:]]*index:/{c++} END{print c+0}' "$PROFILE_FILE")
          if [ -z "$COUNT" ] || [ "$COUNT" -lt 1 ]; then
            echo "FAIL: could not derive GPU count from $PROFILE_FILE"; exit 1
          fi
          echo "gpu-name=$NAME" >> "$GITHUB_OUTPUT"
          echo "gpu-count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Resolved profile '${{ matrix.gpu-profile }}': name='$NAME', $COUNT GPUs"

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ inputs.golang_version }}

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Create Kind cluster with DRA
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: nvml-mock-dra-${{ matrix.gpu-profile }}
          config: tests/e2e/kind-dra-config.yaml

      - name: Build nvml-mock image
        run: |
          docker build -t nvml-mock:e2e -f deployments/nvml-mock/Dockerfile \
            --build-arg GOLANG_VERSION=${{ inputs.golang_version }} .

      - name: Load image into Kind
        run: |
          kind load docker-image nvml-mock:e2e --name nvml-mock-dra-${{ matrix.gpu-profile }}

      - name: Install nvml-mock Helm chart
        run: |
          helm install nvml-mock deployments/nvml-mock/helm/nvml-mock \
            --set image.repository=nvml-mock \
            --set image.tag=e2e \
            --set gpu.profile=${{ matrix.gpu-profile }} \
            --wait --timeout 120s

      - name: Verify DaemonSet is ready
        run: |
          kubectl rollout status daemonset/nvml-mock --timeout=60s

      - name: Verify mock files on node
        run: |
          NODE_CONTAINER=nvml-mock-dra-${{ matrix.gpu-profile }}-control-plane
          docker exec "$NODE_CONTAINER" test -f /var/lib/nvml-mock/driver/config/config.yaml
          docker exec "$NODE_CONTAINER" grep -q "num_devices: ${{ steps.gpu-info.outputs.gpu-count }}" /var/lib/nvml-mock/driver/config/config.yaml
          docker exec "$NODE_CONTAINER" test -L /var/lib/nvml-mock/driver/usr/lib64/libnvidia-ml.so.1
          echo "Mock files verified"

      - name: Validate nvidia-smi output
        run: |
          ./tests/e2e/validate-nvidia-smi.sh \
            nvml-mock-dra-${{ matrix.gpu-profile }}-control-plane \
            "${{ steps.gpu-info.outputs.gpu-name }}" \
            ${{ steps.gpu-info.outputs.gpu-count }}

      - name: Verify fake fabricmanager readiness
        run: |
          # Derive fabricmanager enablement from the deployed daemonset's
          # MOCK_FABRICMANAGER env (the chart sets it from the profile), then
          # skip the readiness probe for profiles that never start it.
          FM=$(kubectl get daemonset nvml-mock \
            -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="MOCK_FABRICMANAGER")].value}' 2>/dev/null || true)
          if [ "$FM" != "on" ]; then
            echo "fabricmanager not enabled for profile '${{ matrix.gpu-profile }}' — skipping readiness check"
            exit 0
          fi
          POD=$(kubectl get pods -l app.kubernetes.io/name=nvml-mock \
            -o jsonpath='{.items[0].metadata.name}')
          # Gate the NV# topology assertion on fabricmanager readiness, as on
          # a real HGX/GB200 node (see e2e-device-plugin for rationale).
          for i in $(seq 1 15); do
            if kubectl exec "$POD" -- /usr/bin/nv-fabricmanager-ctl -q 2>/dev/null | grep -q READY; then
              echo "PASS: fake fabricmanager reports READY"
              exit 0
            fi
            echo "Attempt $i: fabricmanager not ready yet, waiting..."
            sleep 2
          done
          echo "FAIL: fake fabricmanager did not report READY"
          kubectl logs "$POD" --tail=30 || true
          exit 1

      - name: Validate NVLink topology (nvidia-smi topo -m)
        run: |
          ./tests/e2e/validate-nvlink.sh \
            nvml-mock-dra-${{ matrix.gpu-profile }}-control-plane \
            "${{ matrix.gpu-profile }}" \
            ${{ steps.gpu-info.outputs.gpu-count }}

      - name: Add NVIDIA Helm repo
        run: |
          helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
          helm repo update

      - name: Install DRA driver
        run: |
          helm install nvidia-dra-driver nvidia/nvidia-dra-driver-gpu \
            --namespace nvidia \
            --create-namespace \
            --set nvidiaDriverRoot=/var/lib/nvml-mock/driver \
            --set gpuResourcesEnabledOverride=true \
            --set resources.computeDomains.enabled=false \
            --wait --timeout 180s

      - name: Wait for DRA pods
        run: |
          kubectl -n nvidia wait --for=condition=ready pod --all --timeout=120s

      - name: Verify ResourceSlice GPU count
        run: |
          EXPECT=${{ steps.gpu-info.outputs.gpu-count }}
          for i in $(seq 1 30); do
            COUNT=$(kubectl get resourceslices -o json | \
              jq '[.items[].spec.devices // [] | length] | add // 0')
            if [ "$COUNT" = "$EXPECT" ]; then
              echo "PASS: ResourceSlice reports $COUNT GPUs"
              break
            fi
            echo "Attempt $i: ResourceSlice GPUs=$COUNT (expected $EXPECT), waiting..."
            sleep 2
          done
          if [ "$COUNT" != "$EXPECT" ]; then
            echo "FAIL: Expected $EXPECT GPUs in ResourceSlice, got $COUNT"
            exit 1
          fi

      - name: Schedule pod with ResourceClaim
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: resource.k8s.io/v1beta1
          kind: ResourceClaimTemplate
          metadata:
            name: gpu-claim
          spec:
            spec:
              devices:
                requests:
                - name: gpu
                  deviceClassName: gpu.nvidia.com
          ---
          apiVersion: v1
          kind: Pod
          metadata:
            name: gpu-test-pod
          spec:
            restartPolicy: Never
            containers:
            - name: app
              image: busybox:1.36
              command: ["sleep", "300"]
              resources:
                claims:
                - name: gpu
            resourceClaims:
            - name: gpu
              resourceClaimTemplateName: gpu-claim
          EOF

      - name: Wait for pod Running (proves NodePrepareResources succeeded)
        run: |
          if ! kubectl wait --for=jsonpath='{.status.phase}'=Running pod/gpu-test-pod --timeout=120s; then
            echo "Pod did not reach Running in 120s. Diagnosing..."
            if kubectl describe pod gpu-test-pod 2>/dev/null | grep -q 'empty device edits'; then
              echo "FAIL: nvml-mock DRA dev-node layout regression — 'empty device edits' in pod events"
            else
              echo "FAIL: pod stuck for unknown reason (not the dev-node layout regression)"
            fi
            kubectl describe pod gpu-test-pod || true
            exit 1
          fi
          echo "PASS: pod-with-claim reached Running"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== nvml-mock pod logs ==="
          kubectl logs -l app.kubernetes.io/name=nvml-mock --tail=50 || true
          echo "=== DRA driver pods ==="
          kubectl -n nvidia get pods || true
          echo "=== DRA kubelet-plugin pod describe ==="
          kubectl -n nvidia describe pod -l app.kubernetes.io/component=kubelet-plugin || true
          PLUGIN_POD=$(kubectl -n nvidia get pods --no-headers -o custom-columns=':metadata.name' | grep kubelet-plugin | head -1)
          if [ -n "$PLUGIN_POD" ]; then
            echo "=== DRA kubelet-plugin init container logs ($PLUGIN_POD) ==="
            kubectl -n nvidia logs "$PLUGIN_POD" -c init-container --tail=100 || true
            echo "=== DRA kubelet-plugin events ==="
            kubectl -n nvidia get events --field-selector involvedObject.name="$PLUGIN_POD" || true
          fi
          echo "=== DRA driver logs ==="
          kubectl -n nvidia logs -l app.kubernetes.io/name=nvidia-dra-driver-gpu --tail=100 || true
          echo "=== ResourceSlices ==="
          kubectl get resourceslices -o yaml || true
          echo "=== gpu-test-pod describe ==="
          kubectl describe pod gpu-test-pod || true
          echo "=== resourceclaims (all namespaces) ==="
          kubectl get resourceclaims -A -o yaml || true
          echo "=== pod status ==="
          kubectl get pods -A || true
          echo "=== node describe ==="
          kubectl describe nodes || true

  e2e-gpu-operator:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gpu-profile: ${{ fromJson(inputs.gpu_profiles) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve profile GPU count
        id: gpu-info
        run: |
          # Profile-derived GPU count (len of the profile's devices list), the
          # same source of truth the chart uses now that CI no longer pins
          # gpu.count.
          PROFILE_FILE="deployments/nvml-mock/helm/nvml-mock/profiles/${{ matrix.gpu-profile }}.yaml"
          COUNT=$(awk '/^devices:/{f=1;next} /^[^[:space:]]/{f=0} f&&/^[[:space:]]*-[[:space:]]*index:/{c++} END{print c+0}' "$PROFILE_FILE")
          if [ -z "$COUNT" ] || [ "$COUNT" -lt 1 ]; then
            echo "FAIL: could not derive GPU count from $PROFILE_FILE"; exit 1
          fi
          echo "gpu-count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Resolved profile '${{ matrix.gpu-profile }}': $COUNT GPUs"

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ inputs.golang_version }}

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Create Kind cluster for GPU Operator
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: nvml-mock-op-${{ matrix.gpu-profile }}
          config: tests/e2e/kind-gpu-operator-config.yaml

      - name: Install nvidia-container-toolkit in Kind worker
        run: |
          NODE_CONTAINER=nvml-mock-op-${{ matrix.gpu-profile }}-control-plane
          docker exec "$NODE_CONTAINER" bash -c '
            apt-get update -qq
            apt-get install -y -qq curl gpg
            curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
              | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
            curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
              | sed "s#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g" \
              | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
            apt-get update -qq
            apt-get install -y -qq nvidia-container-toolkit
          '

      - name: Configure toolkit for CDI mode
        run: |
          NODE_CONTAINER=nvml-mock-op-${{ matrix.gpu-profile }}-control-plane
          docker exec "$NODE_CONTAINER" nvidia-ctk runtime configure \
            --runtime=containerd --cdi.enabled --set-as-default
          docker exec "$NODE_CONTAINER" bash -c '
            cat > /etc/nvidia-container-runtime/config.toml << EOF
          [nvidia-container-runtime]
          mode = "cdi"

          [nvidia-container-runtime.modes.cdi]
          default-kind = "nvidia.com/gpu"
          spec-dirs = ["/var/run/cdi", "/etc/cdi"]
          EOF
          '

      - name: Restart containerd to pick up nvidia runtime
        run: |
          NODE_CONTAINER=nvml-mock-op-${{ matrix.gpu-profile }}-control-plane
          docker exec "$NODE_CONTAINER" systemctl restart containerd
          sleep 5
          docker exec "$NODE_CONTAINER" crictl info | head -5

      - name: Build nvml-mock image
        run: |
          docker build -t nvml-mock:e2e -f deployments/nvml-mock/Dockerfile \
            --build-arg GOLANG_VERSION=${{ inputs.golang_version }} .

      - name: Load image into Kind
        run: |
          kind load docker-image nvml-mock:e2e --name nvml-mock-op-${{ matrix.gpu-profile }}

      - name: Install nvml-mock Helm chart
        run: |
          helm install nvml-mock deployments/nvml-mock/helm/nvml-mock \
            --set image.repository=nvml-mock \
            --set image.tag=e2e \
            --set gpu.profile=${{ matrix.gpu-profile }} \
            --wait --timeout 120s

      - name: Verify DaemonSet is ready
        run: |
          kubectl rollout status daemonset/nvml-mock --timeout=60s

      - name: Verify CDI spec exists on node
        run: |
          NODE_CONTAINER=nvml-mock-op-${{ matrix.gpu-profile }}-control-plane
          docker exec "$NODE_CONTAINER" test -f /var/run/cdi/nvidia.yaml
          docker exec "$NODE_CONTAINER" cat /var/run/cdi/nvidia.yaml
          echo "CDI spec verified"

      - name: Verify mock driver setup on node
        run: |
          NODE_CONTAINER=nvml-mock-op-${{ matrix.gpu-profile }}-control-plane
          echo "=== symlink check ==="
          docker exec "$NODE_CONTAINER" ls -la /run/nvidia/ 2>&1 || echo "no /run/nvidia"
          docker exec "$NODE_CONTAINER" ls -la /run/nvidia/driver 2>&1 || echo "symlink missing"
          docker exec "$NODE_CONTAINER" readlink -f /run/nvidia/driver 2>&1 || echo "readlink failed"
          echo "=== driver contents ==="
          docker exec "$NODE_CONTAINER" ls -laR /run/nvidia/driver/usr/ 2>&1 || echo "no driver files"
          echo "=== nvidia-smi binary ==="
          docker exec "$NODE_CONTAINER" file /run/nvidia/driver/usr/bin/nvidia-smi 2>&1 || echo "no nvidia-smi"
          echo "=== libnvidia-ml check ==="
          docker exec "$NODE_CONTAINER" ls -la /run/nvidia/driver/usr/lib64/libnvidia-ml* 2>&1 || echo "no nvml"
          echo "=== test nvidia-smi with LD_LIBRARY_PATH ==="
          docker exec "$NODE_CONTAINER" bash -c 'LD_LIBRARY_PATH=/run/nvidia/driver/usr/lib64 /run/nvidia/driver/usr/bin/nvidia-smi' 2>&1 || echo "nvidia-smi failed exit=$?"
          echo "=== test nvidia-smi with LD_PRELOAD + LD_LIBRARY_PATH (validator mode) ==="
          docker exec "$NODE_CONTAINER" bash -c 'LD_PRELOAD=/run/nvidia/driver/usr/lib64/libnvidia-ml.so.1 LD_LIBRARY_PATH=/run/nvidia/driver/usr/lib64 /run/nvidia/driver/usr/bin/nvidia-smi' 2>&1 || echo "nvidia-smi failed exit=$?"
          echo "=== file type check ==="
          docker exec "$NODE_CONTAINER" file /run/nvidia/driver/usr/bin/nvidia-smi 2>&1 || echo "file command not available"

      - name: Test CDI injection end-to-end
        run: |
          NODE_CONTAINER=nvml-mock-op-${{ matrix.gpu-profile }}-control-plane

          echo "=== CDI spec (first 30 lines) ==="
          docker exec "$NODE_CONTAINER" head -30 /var/run/cdi/nvidia.yaml

          echo "=== nvidia-container-runtime config ==="
          docker exec "$NODE_CONTAINER" cat /etc/nvidia-container-runtime/config.toml 2>&1 || echo "config not found"

          echo "=== containerd config (nvidia runtime) ==="
          docker exec "$NODE_CONTAINER" grep -A10 nvidia /etc/containerd/config.toml 2>&1 || echo "no nvidia runtime in containerd config"

          echo "=== nvidia-cdi-hook binary ==="
          docker exec "$NODE_CONTAINER" which nvidia-cdi-hook 2>&1 || echo "nvidia-cdi-hook NOT FOUND"
          docker exec "$NODE_CONTAINER" nvidia-cdi-hook --version 2>&1 || echo "version check failed"

          echo "=== Test CDI injection with a real pod ==="
          cat <<'PODEOF' | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: cdi-test
          spec:
            restartPolicy: Never
            containers:
              - name: test
                image: ubuntu:22.04
                env:
                  - name: NVIDIA_VISIBLE_DEVICES
                    value: "all"
                command: ["sh", "-c"]
                args:
                  - |
                    echo "=== injected files ==="
                    ls -la /usr/bin/nvidia-smi /usr/lib64/libnvidia-ml* 2>&1 || echo "no injected files"
                    echo "=== ldconfig ==="
                    ldconfig -p 2>/dev/null | grep nvidia || echo "no nvidia in ldcache"
                    echo "=== nvidia-smi ==="
                    nvidia-smi 2>&1 || echo "nvidia-smi failed exit=$?"
                    echo "CDI_TEST_DONE"
          PODEOF

          echo "Waiting for cdi-test pod..."
          for i in $(seq 1 30); do
            PHASE=$(kubectl get pod cdi-test -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            if [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "Failed" ]; then
              break
            fi
            echo "  attempt $i: phase=$PHASE"
            sleep 2
          done

          echo "=== CDI test pod status ==="
          kubectl get pod cdi-test -o wide || true
          echo "=== CDI test pod describe ==="
          kubectl describe pod cdi-test 2>&1 | tail -30 || true
          echo "=== CDI test pod logs ==="
          kubectl logs cdi-test 2>&1 || true
          kubectl delete pod cdi-test --ignore-not-found || true

      - name: Add NVIDIA Helm repo
        run: |
          helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
          helm repo update

      - name: Install GPU Operator
        run: |
          helm install gpu-operator nvidia/gpu-operator \
            -n gpu-operator --create-namespace \
            -f tests/e2e/gpu-operator-values.yaml \
            --wait --timeout 300s

      - name: Wait for operator-validator pod
        run: |
          for i in $(seq 1 60); do
            PHASE=$(kubectl -n gpu-operator get pods -l app=nvidia-operator-validator \
              -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "NotFound")
            if [ "$PHASE" = "Running" ]; then
              echo "PASS: nvidia-operator-validator is Running"
              kubectl -n gpu-operator get pods -l app=nvidia-operator-validator
              exit 0
            fi
            echo "Attempt $i/60: validator phase=$PHASE, waiting..."
            sleep 5
          done
          echo "FAIL: nvidia-operator-validator did not reach Running state"
          kubectl -n gpu-operator describe pods -l app=nvidia-operator-validator || true
          exit 1

      - name: Verify GFD node labels
        run: |
          NODE=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')
          for label in nvidia.com/gpu.product nvidia.com/gpu.memory nvidia.com/gpu.count; do
            VALUE=$(kubectl get node "$NODE" -o json | jq -r ".metadata.labels[\"$label\"] // \"NOT_SET\"")
            echo "$label = $VALUE"
            if [ "$VALUE" = "NOT_SET" ] || [ -z "$VALUE" ]; then
              echo "WARNING: GFD label $label not found (may need more time)"
            fi
          done

      - name: Verify allocatable GPUs
        run: |
          NODE=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')
          EXPECT=${{ steps.gpu-info.outputs.gpu-count }}
          for i in $(seq 1 30); do
            GPUS=$(kubectl get node "$NODE" -o jsonpath='{.status.allocatable.nvidia\.com/gpu}')
            if [ "$GPUS" = "$EXPECT" ]; then
              echo "PASS: Node reports $GPUS allocatable GPUs"
              exit 0
            fi
            echo "Attempt $i: allocatable GPUs=$GPUS (expected $EXPECT), waiting..."
            sleep 2
          done
          echo "FAIL: Expected $EXPECT allocatable GPUs, got $GPUS"
          exit 1

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== nvml-mock pod logs ==="
          kubectl logs -l app.kubernetes.io/name=nvml-mock --tail=50 || true
          echo "=== CDI spec ==="
          NODE_CONTAINER=nvml-mock-op-${{ matrix.gpu-profile }}-control-plane
          docker exec "$NODE_CONTAINER" cat /var/run/cdi/nvidia.yaml 2>/dev/null || true
          echo "=== nvidia-container-runtime config ==="
          docker exec "$NODE_CONTAINER" cat /etc/nvidia-container-runtime/config.toml 2>/dev/null || true
          echo "=== GPU Operator pods ==="
          kubectl -n gpu-operator get pods || true
          echo "=== operator-validator describe ==="
          kubectl -n gpu-operator describe pods -l app=nvidia-operator-validator || true
          echo "=== operator-validator init container logs ==="
          VALIDATOR_POD=$(kubectl -n gpu-operator get pods -l app=nvidia-operator-validator \
            --no-headers -o custom-columns=':metadata.name' | head -1)
          if [ -n "$VALIDATOR_POD" ]; then
            for INIT in driver-validation toolkit-validation cuda-validation plugin-validation; do
              echo "--- $INIT ---"
              kubectl -n gpu-operator logs "$VALIDATOR_POD" -c "$INIT" --tail=30 || true
            done
          fi
          echo "=== device plugin logs ==="
          kubectl -n gpu-operator logs -l app=nvidia-device-plugin-daemonset --tail=50 || true
          echo "=== GFD logs ==="
          kubectl -n gpu-operator logs -l app=nvidia-gpu-feature-discovery --tail=50 || true
          echo "=== node describe ==="
          kubectl describe nodes || true

  # Runs the GPU Operator's containerized-driver lifecycle (driver.enabled=true)
  # against the mock-driver image: DaemonSet rendering + image-tag resolution,
  # the k8s-driver-manager init flow, the startup-probe -> .driver-ctr-ready
  # handshake, and the validator's operator-managed driver branch. Complements
  # e2e-gpu-operator, which keeps the driver disabled. Single profile: this
  # lane tests the driver lifecycle, not per-profile NVML behavior (that is
  # covered by the other jobs' matrices).
  e2e-gpu-operator-driver:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # off: kernel interfaces faked in the driver container's namespace
        # on:  stub kernel module (prebuilt on the runner, injected via
        #      /run/nvidia/mock-kmod) gives REAL kernel-global /proc and /sys
        mock_kmod: ["off", "on"]
    env:
      CLUSTER_NAME: nvml-mock-drv-${{ matrix.mock_kmod }}
      # Pinned: the mock-driver image satisfies this version's driver-container
      # contract, vendored at tests/e2e/contract/. Bump both together.
      GPU_OPERATOR_VERSION: v26.3.3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check driver-container contract drift
        run: tests/e2e/check-driver-contract.sh "$GPU_OPERATOR_VERSION"

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Create Kind cluster for GPU Operator
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          config: tests/e2e/kind-gpu-operator-config.yaml

      - name: Set up NVIDIA container toolkit (CDI mode)
        uses: ./.github/actions/setup-kind-nvidia-toolkit
        with:
          node_containers: ${{ env.CLUSTER_NAME }}-control-plane

      - name: Build nvml-mock image
        run: |
          docker build -t nvml-mock:e2e -f deployments/nvml-mock/Dockerfile \
            --build-arg GOLANG_VERSION=${{ inputs.golang_version }} .

      - name: Build mock-driver image
        run: |
          docker build -t docker.io/library/mock-driver:e2e -f deployments/mock-driver/Dockerfile \
            --build-arg GOLANG_VERSION=${{ inputs.golang_version }} .

      - name: Tag mock-driver with OS suffix and load images into Kind
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          # The operator resolves the driver image as
          # <repository>/<image>:<version>-<osID><osVersionID>, where the OS
          # values come from the node's NFD system-os_release labels. Read the
          # same source (the node's /etc/os-release) to compute the tag.
          OSTAG=$(docker exec "$NODE_CONTAINER" sh -c '. /etc/os-release && echo "${ID}${VERSION_ID}"')
          echo "Node OS tag: $OSTAG"
          docker tag docker.io/library/mock-driver:e2e "docker.io/library/mock-driver:e2e-$OSTAG"
          kind load docker-image nvml-mock:e2e --name "$CLUSTER_NAME"
          kind load docker-image "docker.io/library/mock-driver:e2e-$OSTAG" --name "$CLUSTER_NAME"

      - name: Install nvml-mock Helm chart (driver symlink disabled)
        run: |
          helm install nvml-mock deployments/nvml-mock/helm/nvml-mock \
            --set image.repository=nvml-mock \
            --set image.tag=e2e \
            --set gpu.profile=a100 \
            --set gpu.count=2 \
            --set gpuOperator.driverSymlink.enabled=false \
            --wait --timeout 120s
          kubectl rollout status daemonset/nvml-mock --timeout=60s

      - name: Verify /run/nvidia/driver is not a symlink
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          if docker exec "$NODE_CONTAINER" test -L /run/nvidia/driver; then
            echo "FAIL: /run/nvidia/driver is a symlink -- driverSymlink flag not honored"
            exit 1
          fi
          echo "PASS: /run/nvidia/driver left for the driver DaemonSet"

      - name: Prebuild the stub kernel module on the runner
        if: matrix.mock_kmod == 'on'
        run: |
          # Built host-side where apt always has matching kernel headers,
          # then dropped where the driver container already mounts
          # (/run/nvidia) -- see deployments/mock-driver/kmod/.
          sudo apt-get update -qq
          sudo apt-get install -y -qq "linux-headers-$(uname -r)" build-essential
          make -C "/lib/modules/$(uname -r)/build" M="$PWD/deployments/mock-driver/kmod" modules
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          docker exec "$NODE_CONTAINER" mkdir -p /run/nvidia/mock-kmod
          docker cp deployments/mock-driver/kmod/nvidia.ko "$NODE_CONTAINER":/run/nvidia/mock-kmod/nvidia.ko
          echo "stub module staged on the node"

      - name: Add NVIDIA Helm repo
        run: |
          helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
          helm repo update

      - name: Install GPU Operator (managed driver, mock image)
        run: |
          # Layered values: driver-disabled baseline + managed-driver delta
          helm install gpu-operator nvidia/gpu-operator \
            -n gpu-operator --create-namespace \
            --version "$GPU_OPERATOR_VERSION" \
            -f tests/e2e/gpu-operator-values.yaml \
            -f tests/e2e/gpu-operator-driver-values.yaml \
            --set driver.env[2].value=${{ matrix.mock_kmod }} \
            --wait --timeout 300s

      - name: Wait for driver DaemonSet readiness
        run: |
          # The operator renders the driver DaemonSet with updateStrategy
          # OnDelete (see tests/e2e/contract/), and kubectl rollout status
          # only supports RollingUpdate -- poll the readiness counters instead.
          CREATED=""
          for i in $(seq 1 60); do
            if kubectl -n gpu-operator get daemonset nvidia-driver-daemonset >/dev/null 2>&1; then
              CREATED=yes
              break
            fi
            echo "Attempt $i/60: driver DaemonSet not created yet, waiting..."
            sleep 5
          done
          if [ -z "$CREATED" ]; then
            echo "FAIL: driver DaemonSet was never created -- check operator logs and driver image tag resolution"
            kubectl -n gpu-operator logs -l app.kubernetes.io/component=gpu-operator --tail=50 || true
            exit 1
          fi
          for i in $(seq 1 60); do
            DESIRED=$(kubectl -n gpu-operator get daemonset nvidia-driver-daemonset -o jsonpath='{.status.desiredNumberScheduled}' 2>/dev/null || echo "")
            READY=$(kubectl -n gpu-operator get daemonset nvidia-driver-daemonset -o jsonpath='{.status.numberReady}' 2>/dev/null || echo "")
            if [ -n "$DESIRED" ] && [ "$DESIRED" != "0" ] && [ "$READY" = "$DESIRED" ]; then
              echo "PASS: driver DaemonSet ready ($READY/$DESIRED)"
              kubectl -n gpu-operator get pods -l app=nvidia-driver-daemonset -o wide
              exit 0
            fi
            echo "Attempt $i/60: driver pods ready=$READY desired=$DESIRED, waiting..."
            sleep 5
          done
          echo "FAIL: driver DaemonSet did not become ready"
          kubectl -n gpu-operator describe daemonset nvidia-driver-daemonset || true
          kubectl -n gpu-operator describe pods -l app=nvidia-driver-daemonset || true
          exit 1

      - name: Verify driver contract on node
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          echo "=== .driver-ctr-ready (written by the operator's startup probe) ==="
          docker exec "$NODE_CONTAINER" cat /run/nvidia/validations/.driver-ctr-ready
          echo "=== driver rootfs visible on host through the rbind ==="
          docker exec "$NODE_CONTAINER" test -x /run/nvidia/driver/usr/bin/nvidia-smi
          docker exec "$NODE_CONTAINER" test -f /run/nvidia/driver/usr/lib64/libnvidia-ml.so.1
          docker exec "$NODE_CONTAINER" test -f /run/nvidia/driver/config/config.yaml
          echo "=== /proc/driver/nvidia/version through the driver root (informational) ==="
          docker exec "$NODE_CONTAINER" cat /run/nvidia/driver/proc/driver/nvidia/version || \
            echo "WARNING: proc submount not visible through rbind (non-blocking)"
          echo "Driver contract verified"

      - name: Verify kernel-global /proc and /sys (kmod mode)
        if: matrix.mock_kmod == 'on'
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          echo "=== node-level: REAL procfs/sysfs entries ==="
          docker exec "$NODE_CONTAINER" cat /proc/driver/nvidia/version
          docker exec "$NODE_CONTAINER" cat /sys/module/nvidia/refcnt /sys/module/nvidia/version
          echo "=== inside an ordinary pod (kernel-global visibility) ==="
          kubectl run kmod-check --image=ubuntu:22.04 --restart=Never --command -- \
            sh -c 'cat /proc/driver/nvidia/version && cat /sys/module/nvidia/refcnt'
          kubectl wait pod/kmod-check --for=jsonpath='{.status.phase}'=Succeeded --timeout=90s
          kubectl logs kmod-check
          kubectl logs kmod-check | grep -q "NVRM version" || { echo "FAIL: pod did not see kernel-global /proc"; exit 1; }
          kubectl delete pod kmod-check --ignore-not-found
          echo "PASS: real /proc/driver/nvidia and /sys/module/nvidia, node-wide"

      - name: Wait for operator-validator pod
        uses: ./.github/actions/wait-operator-validator

      - name: Verify driver-ready sentinel (managed-driver values)
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          echo "=== driver-ready (written by the validator's managed branch) ==="
          docker exec "$NODE_CONTAINER" cat /run/nvidia/validations/driver-ready
          docker exec "$NODE_CONTAINER" grep -q "/run/nvidia/driver" /run/nvidia/validations/driver-ready
          echo "PASS: driver-ready points at the managed driver root"

      - name: Verify allocatable GPUs
        uses: ./.github/actions/verify-allocatable-gpus
        with:
          expected: "2"

      - name: Verify ClusterPolicy is ready
        run: |
          for i in $(seq 1 30); do
            STATE=$(kubectl get clusterpolicies.nvidia.com -o jsonpath='{.items[0].status.state}' 2>/dev/null || echo "NotFound")
            if [ "$STATE" = "ready" ]; then
              echo "PASS: ClusterPolicy state=ready"
              exit 0
            fi
            echo "Attempt $i/30: ClusterPolicy state=$STATE, waiting..."
            sleep 5
          done
          echo "FAIL: ClusterPolicy did not reach ready state"
          kubectl get clusterpolicies.nvidia.com -o yaml || true
          exit 1

      - name: Collect logs on failure
        if: failure()
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          echo "=== GPU Operator pods ==="
          kubectl -n gpu-operator get pods -o wide || true
          echo "=== driver DaemonSet describe ==="
          kubectl -n gpu-operator describe daemonset nvidia-driver-daemonset || true
          echo "=== driver pod describe ==="
          kubectl -n gpu-operator describe pods -l app=nvidia-driver-daemonset || true
          echo "=== k8s-driver-manager init logs ==="
          kubectl -n gpu-operator logs -l app=nvidia-driver-daemonset -c k8s-driver-manager --tail=100 || true
          echo "=== nvidia-driver-ctr logs ==="
          kubectl -n gpu-operator logs -l app=nvidia-driver-daemonset -c nvidia-driver-ctr --tail=100 || true
          echo "=== /run/nvidia on node ==="
          docker exec "$NODE_CONTAINER" ls -laR /run/nvidia 2>/dev/null | head -60 || true
          echo "=== node labels ==="
          kubectl get nodes --show-labels || true
          echo "=== gpu-operator controller logs ==="
          kubectl -n gpu-operator logs -l app.kubernetes.io/component=gpu-operator --tail=100 || true
          echo "=== ClusterPolicy ==="
          kubectl get clusterpolicies.nvidia.com -o yaml || true
          echo "=== nvml-mock pod logs ==="
          kubectl logs -l app.kubernetes.io/name=nvml-mock --tail=50 || true

      - name: Dump operator-validator init logs
        if: failure()
        uses: ./.github/actions/dump-validator-logs

  # Runs the GPU Operator against the host-driver masquerade: nvml-mock
  # installs nvidia-smi + mock libs at the node's STANDARD paths, so the
  # validator takes its preinstalled host-driver branch and no component
  # needs driver-root plumbing. Complements e2e-gpu-operator (symlinked
  # driver root + env overrides) and e2e-gpu-operator-driver (managed
  # driver DaemonSet). Single profile: this lane tests the host topology,
  # not per-profile NVML behavior.
  e2e-gpu-operator-hostdriver:
    runs-on: ubuntu-latest
    env:
      CLUSTER_NAME: nvml-mock-host
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Create Kind cluster for GPU Operator
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          config: tests/e2e/kind-gpu-operator-config.yaml

      - name: Set up NVIDIA container toolkit (CDI mode)
        uses: ./.github/actions/setup-kind-nvidia-toolkit
        with:
          node_containers: ${{ env.CLUSTER_NAME }}-control-plane

      - name: Build nvml-mock image
        run: |
          docker build -t nvml-mock:e2e -f deployments/nvml-mock/Dockerfile \
            --build-arg GOLANG_VERSION=${{ inputs.golang_version }} .

      - name: Load image into Kind
        run: |
          kind load docker-image nvml-mock:e2e --name "$CLUSTER_NAME"

      - name: Install nvml-mock Helm chart (host driver masquerade)
        run: |
          helm install nvml-mock deployments/nvml-mock/helm/nvml-mock \
            --set image.repository=nvml-mock \
            --set image.tag=e2e \
            --set gpu.profile=a100 \
            --set gpu.count=2 \
            --set hostDriver.enabled=true \
            --wait --timeout 120s
          kubectl rollout status daemonset/nvml-mock --timeout=60s

      - name: Verify zero-plumbing host paths
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          # The DaemonSet has no readiness probe, so poll for setup.sh's host
          # masquerade install before asserting.
          for i in $(seq 1 12); do
            if docker exec "$NODE_CONTAINER" test -f /usr/bin/nvidia-smi; then
              break
            fi
            echo "Attempt $i/12: waiting for host masquerade install..."
            sleep 5
          done
          echo "=== plain nvidia-smi at the standard path, no env plumbing ==="
          docker exec "$NODE_CONTAINER" /usr/bin/nvidia-smi -L
          COUNT=$(docker exec "$NODE_CONTAINER" /usr/bin/nvidia-smi -L | grep -c "^GPU")
          [ "$COUNT" = "2" ] || { echo "FAIL: expected 2 GPUs, got $COUNT"; exit 1; }
          echo "=== libnvidia-ml resolvable through the ldcache ==="
          docker exec "$NODE_CONTAINER" sh -c 'ldconfig -p | grep libnvidia-ml.so.1'
          echo "=== manifest recorded ==="
          docker exec "$NODE_CONTAINER" cat /var/lib/nvml-mock/host-driver-manifest.txt
          echo "PASS: host driver masquerade verified"

      - name: Add NVIDIA Helm repo
        run: |
          helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
          helm repo update

      - name: Install GPU Operator (preinstalled host driver)
        run: |
          # Layered values: driver-disabled baseline + host-driver delta
          helm install gpu-operator nvidia/gpu-operator \
            -n gpu-operator --create-namespace \
            -f tests/e2e/gpu-operator-values.yaml \
            -f tests/e2e/gpu-operator-hostdriver-values.yaml \
            --wait --timeout 300s

      - name: Wait for operator-validator pod
        uses: ./.github/actions/wait-operator-validator

      - name: Verify driver-ready sentinel (host-driver values)
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          echo "=== driver-ready (written by the validator's host branch) ==="
          docker exec "$NODE_CONTAINER" cat /run/nvidia/validations/driver-ready
          docker exec "$NODE_CONTAINER" grep -qi "IS_HOST_DRIVER.*true" /run/nvidia/validations/driver-ready
          echo "PASS: validator took the preinstalled host-driver branch"

      - name: Verify allocatable GPUs
        uses: ./.github/actions/verify-allocatable-gpus
        with:
          expected: "2"

      - name: Run a GPU workload pod through the allocation path
        run: |
          # Covers device-plugin CDI allocation end-to-end (Allocate ->
          # plugin-generated CDI spec -> containerd injection), which the
          # NVIDIA_VISIBLE_DEVICES-based CDI test in e2e-gpu-operator bypasses.
          cat << 'PODEOF' | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: gpu-workload
          spec:
            restartPolicy: Never
            containers:
              - name: cuda-app
                image: ubuntu:22.04
                command: ["sh", "-c", "ls -la /dev/nvidia* && nvidia-smi -L"]
                resources:
                  limits:
                    nvidia.com/gpu: 1
          PODEOF
          for i in $(seq 1 30); do
            PHASE=$(kubectl get pod gpu-workload -o jsonpath='{.status.phase}' 2>/dev/null || echo Pending)
            [ "$PHASE" = "Succeeded" ] && break
            [ "$PHASE" = "Failed" ] && { kubectl describe pod gpu-workload | tail -15; exit 1; }
            echo "attempt $i: workload phase=$PHASE"
            sleep 5
          done
          kubectl logs gpu-workload
          kubectl logs gpu-workload | grep -q "^GPU 0:" || { echo "FAIL: workload did not see a GPU"; exit 1; }
          kubectl delete pod gpu-workload --ignore-not-found
          echo "PASS: allocation path delivered a GPU to the workload"

      - name: Verify uninstall removes host files
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          helm uninstall nvml-mock --wait --timeout 120s
          for i in $(seq 1 12); do
            if docker exec "$NODE_CONTAINER" test ! -f /usr/bin/nvidia-smi; then
              break
            fi
            echo "Attempt $i/12: waiting for preStop cleanup..."
            sleep 5
          done
          docker exec "$NODE_CONTAINER" test ! -f /usr/bin/nvidia-smi
          docker exec "$NODE_CONTAINER" test ! -e /config
          docker exec "$NODE_CONTAINER" test ! -f /etc/ld.so.conf.d/00-nvml-mock.conf
          docker exec "$NODE_CONTAINER" sh -c 'ls /usr/lib64/libnvidia-ml.so* /usr/lib64/libcuda* 2>/dev/null | grep . && exit 1 || exit 0'
          docker exec "$NODE_CONTAINER" sh -c 'ldconfig -p | grep libnvidia-ml && exit 1 || exit 0'
          echo "PASS: uninstall left no host residue"

      - name: Collect logs on failure
        if: failure()
        run: |
          NODE_CONTAINER=$CLUSTER_NAME-control-plane
          echo "=== nvml-mock pod logs ==="
          kubectl logs -l app.kubernetes.io/name=nvml-mock --tail=50 || true
          echo "=== host paths ==="
          docker exec "$NODE_CONTAINER" ls -la /usr/bin/nvidia-smi /usr/lib64/ /config 2>/dev/null || true
          echo "=== GPU Operator pods ==="
          kubectl -n gpu-operator get pods -o wide || true
          echo "=== driver-ready ==="
          docker exec "$NODE_CONTAINER" cat /run/nvidia/validations/driver-ready 2>/dev/null || true
          echo "=== node describe ==="
          kubectl describe nodes || true

      - name: Dump operator-validator init logs
        if: failure()
        uses: ./.github/actions/dump-validator-logs

  e2e-multi-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ inputs.golang_version }}

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Create multi-node Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: gpu-fleet
          config: tests/e2e/kind-multi-node-config.yaml

      - name: Build nvml-mock image
        run: |
          docker build -t nvml-mock:e2e -f deployments/nvml-mock/Dockerfile \
            --build-arg GOLANG_VERSION=${{ inputs.golang_version }} .

      - name: Load image into Kind
        run: |
          kind load docker-image nvml-mock:e2e --name gpu-fleet

      - name: Discover worker node names
        id: nodes
        run: |
          WORKERS=$(kind get nodes --name gpu-fleet | grep worker | sort)
          echo "Worker nodes: $WORKERS"
          WORKER1=$(echo "$WORKERS" | head -1)
          WORKER2=$(echo "$WORKERS" | tail -1)
          echo "worker1=$WORKER1" >> "$GITHUB_OUTPUT"
          echo "worker2=$WORKER2" >> "$GITHUB_OUTPUT"

      - name: Verify node labels
        run: |
          kubectl get nodes --show-labels | grep nvml-mock/profile || {
            echo "FAIL: nvml-mock/profile labels not found on worker nodes"
            kubectl get nodes --show-labels
            exit 1
          }

      - name: Install nvidia-container-toolkit on workers
        run: |
          for NODE in ${{ steps.nodes.outputs.worker1 }} ${{ steps.nodes.outputs.worker2 }}; do
            echo "Installing nvidia-container-toolkit on $NODE..."
            docker exec "$NODE" bash -c '
              apt-get update -qq &&
              apt-get install -y -qq curl gpg > /dev/null &&
              curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey |
                gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg &&
              curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list |
                sed "s#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g" |
                tee /etc/apt/sources.list.d/nvidia-container-toolkit.list &&
              apt-get update -qq &&
              apt-get install -y -qq nvidia-container-toolkit > /dev/null
            '
            docker exec "$NODE" systemctl restart containerd
            echo "Done: $NODE"
          done
          sleep 5

      - name: Install nvml-mock on worker-1 (A100 profile)
        run: |
          helm install nvml-mock-a100 deployments/nvml-mock/helm/nvml-mock \
            --set image.repository=nvml-mock \
            --set image.tag=e2e \
            --set gpu.profile=a100 \
            --set "nodeSelector.nvml-mock/profile=a100" \
            --wait --timeout 120s

      - name: Install nvml-mock on worker-2 (T4 profile)
        run: |
          helm install nvml-mock-t4 deployments/nvml-mock/helm/nvml-mock \
            --set image.repository=nvml-mock \
            --set image.tag=e2e \
            --set gpu.profile=t4 \
            --set "nodeSelector.nvml-mock/profile=t4" \
            --wait --timeout 120s

      - name: Verify mock files on both workers
        run: |
          echo "=== Worker-1 (A100) ==="
          docker exec "${{ steps.nodes.outputs.worker1 }}" ls -la /var/lib/nvml-mock/driver/usr/lib64/libnvidia-ml.so.* | head -2
          docker exec "${{ steps.nodes.outputs.worker1 }}" grep "NVIDIA A100" /var/lib/nvml-mock/config/config.yaml | head -1

          echo "=== Worker-2 (T4) ==="
          docker exec "${{ steps.nodes.outputs.worker2 }}" ls -la /var/lib/nvml-mock/driver/usr/lib64/libnvidia-ml.so.* | head -2
          docker exec "${{ steps.nodes.outputs.worker2 }}" grep "NVIDIA T4" /var/lib/nvml-mock/config/config.yaml | head -1

      - name: Validate ibstat / ibstatus on both workers
        run: |
          # Counts come from each profile's devices list (a100 -> 8, t4 -> 4),
          # since CI no longer pins gpu.count.
          PROFILES=deployments/nvml-mock/helm/nvml-mock/profiles
          gpu_count() { awk '/^devices:/{f=1;next} /^[^[:space:]]/{f=0} f&&/^[[:space:]]*-[[:space:]]*index:/{c++} END{print c+0}' "$1"; }
          # A100 release: IB enabled, one HCA per GPU.
          A100_POD=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-a100 \
            -o jsonpath='{.items[0].metadata.name}')
          ./tests/e2e/validate-ibstat.sh "$A100_POD" a100 "$(gpu_count "$PROFILES/a100.yaml")"
          # T4 release: IB disabled by default, expect zero HCAs (count arg ignored).
          T4_POD=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-t4 \
            -o jsonpath='{.items[0].metadata.name}')
          ./tests/e2e/validate-ibstat.sh "$T4_POD" t4 "$(gpu_count "$PROFILES/t4.yaml")"

      - name: Deploy NVIDIA device plugin
        run: |
          kubectl apply -f tests/e2e/device-plugin-mock.yaml
          # Wait for the DaemonSet rollout before waiting on its pods: a bare
          # `kubectl wait pod -l ...` run immediately after apply fails with
          # "no matching resources found" if the DS controller hasn't created
          # the pod yet. rollout status tolerates that and blocks until ready.
          kubectl -n kube-system rollout status \
            daemonset/nvidia-device-plugin-mock --timeout=120s
          kubectl -n kube-system wait --for=condition=ready \
            pod -l name=nvidia-device-plugin-mock --timeout=120s

      - name: Verify GPUs on both nodes
        run: |
          WORKER1="${{ steps.nodes.outputs.worker1 }}"
          WORKER2="${{ steps.nodes.outputs.worker2 }}"
          # Expected counts come from each profile's devices list (a100 -> 8,
          # t4 -> 4), since CI no longer pins gpu.count.
          PROFILES=deployments/nvml-mock/helm/nvml-mock/profiles
          gpu_count() { awk '/^devices:/{f=1;next} /^[^[:space:]]/{f=0} f&&/^[[:space:]]*-[[:space:]]*index:/{c++} END{print c+0}' "$1"; }
          A100_EXPECT=$(gpu_count "$PROFILES/a100.yaml")
          T4_EXPECT=$(gpu_count "$PROFILES/t4.yaml")
          echo "Waiting for device-plugin to register GPUs on both nodes (expect A100=$A100_EXPECT, T4=$T4_EXPECT)..."
          for i in $(seq 1 30); do
            A100_GPUS=$(kubectl get node "$WORKER1" -o jsonpath='{.status.allocatable.nvidia\.com/gpu}' 2>/dev/null || echo "0")
            T4_GPUS=$(kubectl get node "$WORKER2" -o jsonpath='{.status.allocatable.nvidia\.com/gpu}' 2>/dev/null || echo "0")
            if [ "$A100_GPUS" = "$A100_EXPECT" ] && [ "$T4_GPUS" = "$T4_EXPECT" ]; then
              echo "PASS: Heterogeneous GPU fleet detected"
              echo "  $WORKER1 (A100): $A100_GPUS GPUs"
              echo "  $WORKER2 (T4):   $T4_GPUS GPUs"
              exit 0
            fi
            echo "Attempt $i: $WORKER1=$A100_GPUS $WORKER2=$T4_GPUS (expected $A100_EXPECT+$T4_EXPECT), waiting..."
            sleep 5
          done
          echo "FAIL: Expected $A100_EXPECT GPUs on worker1 and $T4_EXPECT on worker2"
          kubectl describe nodes | grep -A5 "Allocatable"
          exit 1

      - name: Test cross-node GPU scheduling
        run: |
          cat <<'PODEOF' | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: gpu-scheduling-test
          spec:
            restartPolicy: Never
            containers:
              - name: test
                image: busybox:1.36
                command: ["sh", "-c", "echo scheduled-on=$(hostname); sleep 5"]
                resources:
                  limits:
                    nvidia.com/gpu: 1
          PODEOF

          echo "Waiting for pod to be scheduled..."
          kubectl wait --for=condition=Ready pod/gpu-scheduling-test --timeout=60s || {
            echo "Pod did not reach Ready state"
            kubectl describe pod/gpu-scheduling-test
            exit 1
          }
          NODE=$(kubectl get pod gpu-scheduling-test -o jsonpath='{.spec.nodeName}')
          echo "PASS: GPU pod scheduled on node: $NODE"
          kubectl delete pod gpu-scheduling-test --ignore-not-found

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== nvml-mock pods ==="
          kubectl get pods -A -l app.kubernetes.io/name=nvml-mock -o wide || true
          echo "=== nvml-mock-a100 logs ==="
          kubectl logs -l app.kubernetes.io/instance=nvml-mock-a100 --tail=30 || true
          echo "=== nvml-mock-t4 logs ==="
          kubectl logs -l app.kubernetes.io/instance=nvml-mock-t4 --tail=30 || true
          echo "=== device plugin logs ==="
          kubectl -n kube-system logs -l name=nvidia-device-plugin-mock --tail=50 || true
          echo "=== node labels ==="
          kubectl get nodes -o json | jq '.items[] | {name: .metadata.name, labels: (.metadata.labels | to_entries | map(select(.key | startswith("nvidia.com") or startswith("nvml-mock"))) | from_entries)}' || true
          echo "=== events ==="
          kubectl get events --sort-by=.lastTimestamp | tail -30 || true
          echo "=== node describe ==="
          kubectl describe nodes || true

  ibping-multinode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Create multi-node Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: ibping-fleet
          config: tests/e2e/kind-multi-node-config.yaml

      - name: Build nvml-mock image
        run: |
          docker build -t nvml-mock:e2e -f deployments/nvml-mock/Dockerfile \
            --build-arg GOLANG_VERSION=${{ inputs.golang_version }} .

      - name: Load image into Kind
        run: |
          kind load docker-image nvml-mock:e2e --name ibping-fleet

      - name: Discover worker node names
        id: nodes
        run: |
          WORKERS=$(kind get nodes --name ibping-fleet | grep worker | sort)
          echo "Worker nodes: $WORKERS"
          WORKER1=$(echo "$WORKERS" | head -1)
          WORKER2=$(echo "$WORKERS" | tail -1)
          echo "worker1=$WORKER1" >> "$GITHUB_OUTPUT"
          echo "worker2=$WORKER2" >> "$GITHUB_OUTPUT"

      - name: Install nvml-mock on worker-1 (A100 + ibping)
        run: |
          helm install nvml-mock-w1 deployments/nvml-mock/helm/nvml-mock \
            --set image.repository=nvml-mock \
            --set image.tag=e2e \
            --set gpu.profile=a100 \
            --set "nodeSelector.kubernetes\.io/hostname=${{ steps.nodes.outputs.worker1 }}" \
            --wait --timeout 120s

      - name: Install nvml-mock on worker-2 (A100 + ibping)
        run: |
          helm install nvml-mock-w2 deployments/nvml-mock/helm/nvml-mock \
            --set image.repository=nvml-mock \
            --set image.tag=e2e \
            --set gpu.profile=a100 \
            --set "nodeSelector.kubernetes\.io/hostname=${{ steps.nodes.outputs.worker2 }}" \
            --wait --timeout 120s

      - name: Validate cross-node ibping
        run: |
          SERVER_POD=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-w1 \
            -o jsonpath='{.items[0].metadata.name}')
          CLIENT_POD=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-w2 \
            -o jsonpath='{.items[0].metadata.name}')
          echo "Server pod: $SERVER_POD"
          echo "Client pod: $CLIENT_POD"
          ./tests/e2e/validate-ibping.sh "$SERVER_POD" "$CLIENT_POD"

      - name: Validate cross-node iblinkinfo
        run: |
          W1=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-w1 \
            -o jsonpath='{.items[0].metadata.name}')
          W2=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-w2 \
            -o jsonpath='{.items[0].metadata.name}')
          # HCA count = a100 profile GPU count (one HCA per GPU), derived from
          # the profile devices list since CI no longer pins gpu.count.
          A100=$(awk '/^devices:/{f=1;next} /^[^[:space:]]/{f=0} f&&/^[[:space:]]*-[[:space:]]*index:/{c++} END{print c+0}' deployments/nvml-mock/helm/nvml-mock/profiles/a100.yaml)
          ./tests/e2e/validate-iblinkinfo.sh "$W1" "$W2" a100 "$A100"

      - name: Validate sminfo (master subnet manager)
        run: |
          chmod +x tests/e2e/validate-sminfo.sh
          W1=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-w1 \
            -o jsonpath='{.items[0].metadata.name}')
          W2=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-w2 \
            -o jsonpath='{.items[0].metadata.name}')
          # Pass W2 as peer so the validator also asserts both pods agree on a
          # single master SM GUID (the consistent-SM-identity property).
          ./tests/e2e/validate-sminfo.sh "$W1" a100 2 "$W2"

      - name: Validate cross-node ibnetdiscover
        run: |
          chmod +x tests/e2e/validate-ibnetdiscover.sh
          W1=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-w1 \
            -o jsonpath='{.items[0].metadata.name}')
          W2=$(kubectl get pods -l app.kubernetes.io/instance=nvml-mock-w2 \
            -o jsonpath='{.items[0].metadata.name}')
          ./tests/e2e/validate-ibnetdiscover.sh "$W1" "$W2" a100 2

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== nvml-mock pods ==="
          kubectl get pods -A -l app.kubernetes.io/name=nvml-mock -o wide || true
          echo "=== nvml-mock-w1 logs ==="
          kubectl logs -l app.kubernetes.io/instance=nvml-mock-w1 --tail=50 || true
          echo "=== nvml-mock-w2 logs ==="
          kubectl logs -l app.kubernetes.io/instance=nvml-mock-w2 --tail=50 || true
          echo "=== events ==="
          kubectl get events --sort-by=.lastTimestamp | tail -30 || true
