name: Set up NVIDIA Container Toolkit in Kind nodes
description: >-
  Install nvidia-container-toolkit inside Kind node containers, optionally
  configure nvidia-container-runtime in CDI mode, and restart containerd.
  Shared by the e2e jobs so the toolkit install stays in one place.

inputs:
  node_containers:
    description: "Space-separated Kind node container names"
    required: true
  configure_cdi:
    description: "Configure nvidia-container-runtime in CDI mode and set as default"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install nvidia-container-toolkit
      shell: bash
      run: |
        for NODE in ${{ inputs.node_containers }}; do
          echo "Installing nvidia-container-toolkit on $NODE..."
          docker exec "$NODE" bash -c '
            set -e
            apt-get update -qq
            apt-get install -y -qq curl gpg
            curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
              | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
            curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
              | sed "s#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g" \
              | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
            apt-get update -qq
            apt-get install -y -qq nvidia-container-toolkit
          '
        done

    - name: Configure toolkit for CDI mode
      if: inputs.configure_cdi == 'true'
      shell: bash
      run: |
        for NODE in ${{ inputs.node_containers }}; do
          docker exec "$NODE" nvidia-ctk runtime configure \
            --runtime=containerd --cdi.enabled --set-as-default
          docker exec "$NODE" bash -c '
            cat > /etc/nvidia-container-runtime/config.toml << EOF
        [nvidia-container-runtime]
        mode = "cdi"

        [nvidia-container-runtime.modes.cdi]
        default-kind = "nvidia.com/gpu"
        spec-dirs = ["/var/run/cdi", "/etc/cdi"]
        EOF
          '
        done

    - name: Restart containerd to pick up nvidia runtime
      shell: bash
      run: |
        for NODE in ${{ inputs.node_containers }}; do
          docker exec "$NODE" systemctl restart containerd
        done
        sleep 5
        for NODE in ${{ inputs.node_containers }}; do
          docker exec "$NODE" crictl info | head -5 || true
        done
