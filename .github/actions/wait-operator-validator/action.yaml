name: Wait for GPU Operator validator
description: >-
  Poll until the nvidia-operator-validator pod reaches Running, failing with
  a describe dump if it never does. Shared by the GPU Operator e2e jobs.

inputs:
  namespace:
    description: "Namespace the GPU Operator is installed in"
    required: false
    default: "gpu-operator"
  attempts:
    description: "Number of 5-second poll attempts"
    required: false
    default: "60"

runs:
  using: composite
  steps:
    - name: Wait for operator-validator pod
      shell: bash
      run: |
        NS='${{ inputs.namespace }}'
        for i in $(seq 1 ${{ inputs.attempts }}); do
          PHASE=$(kubectl -n "$NS" get pods -l app=nvidia-operator-validator \
            -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "NotFound")
          if [ "$PHASE" = "Running" ]; then
            echo "PASS: nvidia-operator-validator is Running"
            kubectl -n "$NS" get pods -l app=nvidia-operator-validator
            exit 0
          fi
          echo "Attempt $i/${{ inputs.attempts }}: validator phase=$PHASE, waiting..."
          sleep 5
        done
        echo "FAIL: nvidia-operator-validator did not reach Running state"
        kubectl -n "$NS" describe pods -l app=nvidia-operator-validator || true
        exit 1
