gpu:
  profile: a100           # a100 | h100 | b200 | gb200 | l40s | t4
  count: 8
  customConfig: ""

image:
  repository: ghcr.io/nvidia/nvml-mock
  tag: latest
  pullPolicy: IfNotPresent

driverVersion: ""                  # Auto-derived from profile. Override: "550.163.01"

nodeSelector: {}
tolerations:
  - operator: Exists

resources: {}

# Integration with external projects
integrations:
  fakeGpuOperator:
    enabled: false
    # Labels applied to per-profile ConfigMaps for discovery
    profileLabels:
      run.ai/gpu-profile: "true"
