gpu:
  profile: a100           # any *.yaml basename under profiles/ (e.g. a100, h100, b200, gb200, gb300, l40s, t4)
  # Number of GPUs to expose. Empty (default) derives the count from the
  # selected profile's `devices:` list (t4 -> 4, all NVSwitch baseboards/NVL
  # slices -> 8), so the profile is the single source of truth. Set to a
  # positive integer to force a smaller/larger slice; setup.sh caps it to the
  # profile's device count at runtime.
  count: ""
  customConfig: ""

  # Opt-in time-varying temperature / power / utilization. Disabled by default
  # (static profile values). See pkg/gpu/mocknvml/README.md#dynamic-metrics-optional.
  #
  # Per-field resolution, highest priority last:
  #   chart baseline  <  GPU profile default  <  user override (below / --set)
  # Leave a field unset to inherit. Profiles set a power base that fits their
  # TDP envelope (t4 ~65W, b200/gb200 ~600W, gb300 ~800W; others use the 250W
  # baseline) so it isn't force-clamped to a bound.
  dynamicMetrics:
    enabled: false
    # Chart baseline defaults, shown for reference. Uncomment to override:
    # seed: 0                            # 0 = time-based; non-zero for reproducibility
    # temperature:
    #   base_c: 55
    #   variance_c: 3
    #   ramp_c: 15
    #   ramp_period_sec: 120
    # power:                             # profile default wins unless set here
    #   base_mw: 250000
    #   variance_mw: 25000
    # utilization:
    #   pattern: burst                   # idle | busy | burst | steady
    #   gpu_min: 0
    #   gpu_max: 100
    #   memory_min: 0
    #   memory_max: 100
    #   burst_period_sec: 30

  # Opt-in simulation of GPU failure scenarios: lost device, fallen-off-bus,
  # uncorrectable ECC errors, and Xid critical events. When `enabled: false`
  # (the default) the rendered ConfigMap is unchanged and the mock reports
  # healthy hardware.
  #
  # See pkg/gpu/mocknvml/README.md#failure-injection-optional for the full
  # behavioural contract per mode.
  failureInjection:
    enabled: false
    mode: healthy                        # healthy (no-op) | lost | fallen_off_bus | ecc_uncorrectable
    probability: 0.0                     # 0..1 chance per guarded NVML call
    after_calls: 0                       # deterministic trip after N guarded calls (0 = disabled)
    seed: 0                              # 0 = time-based; non-zero for reproducible rolls
    xid:
      code: 0                            # 0 = no Xid surfaced; e.g. 79 = "GPU has fallen off the bus"

image:
  repository: ghcr.io/nvidia/nvml-mock
  tag: latest
  pullPolicy: IfNotPresent

driverVersion: ""                  # Auto-derived from profile. Override: "550.163.01"

nodeSelector: {}
tolerations:
  - operator: Exists

resources: {}

# Node-wide ambient injection via containerd NRI. When enabled, a lightweight
# node-local plugin appends the nvml-mock overlay mount and environment to each
# container at runtime without mutating pod specs. Opt-in (default false): it
# injects into workloads cluster-wide, so enable it only for the
# node-wide-injection demo/use case. See docs/demo/node-wide-injection.
nri:
  enabled: false
  socketPath: /var/run/nri/nri.sock
  pluginName: nvml-mock
  pluginIndex: "10"
  image: {}
  overlay:
    hostPath: /var/lib/nvml-mock
    mountPath: /opt/nvml-mock
  optOutAnnotation: nvml-mock.nvidia.com/inject
  # Workloads that can set this pod annotation to "true" can opt into host GPU
  # device-node mounts from the staged mock overlay. Treat that pod-authored
  # control as part of the demo trust boundary and exclude namespaces as needed.
  deviceAnnotation: nvml-mock.nvidia.com/devices
  excludedNamespaces: []
  resources: {}

# DaemonSet rolling update strategy.
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%

# Pod termination grace period. preStop cleanup is a few rm -rf
# calls plus kubectl label requests, so the upstream 30s default
# is overkill and slows rollouts.
terminationGracePeriodSeconds: 2

# ComputeDomain (NVLink fabric) simulation. Opt-in: when `topology.enabled`
# is true a cluster-level ConfigMap declaring domain UUID + per-clique node
# membership is rendered and mounted into every nvml-mock pod. The mock
# NVML engine looks up its NODE_NAME on startup and overrides each GPU's
# fabric cluster_uuid / clique_id accordingly. See
# pkg/gpu/mocknvml/engine/fabric.go and issue NVIDIA/k8s-test-infra#304.
topology:
  enabled: false
  # Cluster-level topology document (consumed only by the mock NVML
  # engine). Each node must appear in exactly one clique within one
  # domain. Example:
  # domains:
  #   - name: "test-domain-1"
  #     uuid: "00000000-0000-0000-0000-000000000001"
  #     cliques:
  #       - id: 0
  #         nodes: [kind-worker, kind-worker2]
  #       - id: 1
  #         nodes: [kind-worker3, kind-worker4]
  domains: []

# InfiniBand ping mock. For profiles with infiniband.enabled=true, the
# DaemonSet preloads libibmockumad alongside libibmocksys, starts mock-ib via
# the container entrypoint, exposes a headless Service on `ping.port`, and sets
# MOCK_IB / MOCK_IB_PING_FABRIC so ibping can reach peer pods.
#
# MOCK_IB is a tri-state mock tier:
#   full  -> all shims (libibmocksys sysfs, libibmockumad UMAD, libibmockverbs
#            verbs) + the mock-ib daemon. Enables
#            ibstat/ibstatus/ibping/iblinkinfo/ibv_devinfo.
#   sysfs -> libibmocksys sysfs redirection only (ibstat/ibstatus; no daemon).
#   off   -> every shim is a no-op (real host).
# The shims stay LD_PRELOAD'd in every container process regardless of tier and
# no-op when MOCK_IB=off, so `MOCK_IB=off <cmd>` is the per-command escape hatch.
infiniband:
  # mockTier sets the container's MOCK_IB value: off | sysfs | full.
  # Defaults to "full" for InfiniBand-enabled profiles and "sysfs" for non-IB
  # profiles (sysfs keeps the libibmocksys redirect active so any real host IB
  # is masked, i.e. ibstat reports 0 HCAs). Leaving this empty auto-derives
  # that per profile. Set it explicitly to override (an invalid value fails
  # `helm template`).
  mockTier: ""
  ping:
    port: 18515
    # The mock-ib TCP fabric listener binds 0.0.0.0:<port> with no auth and
    # the DaemonSet runs privileged. This NetworkPolicy restricts inbound
    # access to that port to peer nvml-mock pods (the only legitimate
    # clients), limiting the blast radius on clusters whose CNI enforces
    # NetworkPolicy. NOTE: Kind's default CNI (kindnet) ENFORCES
    # NetworkPolicy on current releases, so this allow-list is load-bearing
    # there; it also matters on Calico/Cilium.
    networkPolicy:
      enabled: true
  # Advertise the mock Mellanox NIC to Node Feature Discovery (NFD). The real
  # kernel /sys cannot be populated with fake PCI devices, and NFD exposes no
  # values-based way to redirect its sysfs, so instead of patching NFD's
  # DaemonSet the node agent writes an NFD "local" source feature file into the
  # node's features.d directory. NFD reads that directory on every scan and
  # publishes feature.node.kubernetes.io/pci-15b3.present=true — the same label
  # the NVIDIA Network Operator's nvidia-nics-rules NodeFeatureRule derives for
  # real Mellanox NICs. The file lives on the node and is durable across
  # operator reconciles of NFD's DaemonSet (they manage the DaemonSet, not the
  # features.d content). On by default; only takes effect on an
  # InfiniBand-enabled profile.
  nfd:
    publishNicLabel: true
    # Node directory NFD's local source reads. Default matches the NFD /
    # Network Operator chart's host-features-d hostPath.
    featuresDir: /etc/kubernetes/node-feature-discovery/features.d

# DEPRECATED — fake IMEX coordination, removed in a follow-up release.
# The fake nvidia-imex / nvidia-imex-ctl marker protocol is superseded
# by the REAL nvidia-imex daemon running in NO GPU mode (--nogpu) via
# imex-nogpu-shim; real daemons coordinate over the pod network and
# need no hostPath (see deployments/nvml-mock/Dockerfile.compute-domain-daemon
# and NVIDIA/k8s-test-infra#304). While deprecated, `imex.enabled: true`
# still mounts the hostPath state directory the fakes' marker files use.
imex:
  enabled: false
  stateDir: /var/lib/nvml-mock/imex-state

# Fake nvidia-fabricmanager. NVSwitch platforms (HGX H100 / GB200 / GB300)
# run nvidia-fabricmanager to register GPUs with the NVSwitch fabric. When
# enabled the entrypoint starts the fake nvidia-fabricmanager daemon (baked
# into the image), which writes a node-local readiness marker under
# `stateDir`. The mock NVML engine reads that marker to resolve each GPU's
# fabric state for profiles that set `fabric.state: auto` (GB200/GB300/H100):
# IN_PROGRESS until the daemon is ready, COMPLETED once it is.
#
# `enabled` is a tri-state override and is derived from the GPU profile by
# default — leave it empty and the chart starts the daemon when the profile
# declares NVSwitches (`nvlink.switches`) or sets `device_defaults.fabric.state:
# auto` (same pattern as infiniband.mockTier). A100 runs the legacy daemon
# (NVSwitch baseboard, no GpuFabricInfo API); standalone B200/L40S/T4 declare
# no NVSwitches and do not start the daemon. Set to true/false to force it
# regardless of profile (e.g. with gpu.customConfig).
fabricmanager:
  enabled: ""
  stateDir: /var/lib/nvml-mock/fabric-state

# Integration with external projects
integrations:
  fakeGpuOperator:
    enabled: false
    # Labels applied to per-profile ConfigMaps for discovery
    profileLabels:
      run.ai/gpu-profile: "true"
