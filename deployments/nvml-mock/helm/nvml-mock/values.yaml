gpu:
  profile: a100           # a100 | h100 | b200 | gb200 | l40s | t4
  count: 8
  customConfig: ""

  # Opt-in: make GetTemperature / GetPowerUsage / GetUtilizationRates return
  # time-varying values instead of the static figures from the profile.
  # When `enabled: false` (default), the rendered ConfigMap is unchanged
  # and the mock reproduces the historical static behavior.
  # See pkg/gpu/mocknvml/README.md#dynamic-metrics-optional for semantics.
  dynamicMetrics:
    enabled: false
    seed: 0                              # 0 = time-based; non-zero for reproducibility
    temperature:
      base_c: 55
      variance_c: 3
      ramp_c: 15
      ramp_period_sec: 120
    power:
      base_mw: 250000
      variance_mw: 25000
    utilization:
      pattern: burst                     # idle | busy | burst | steady
      gpu_min: 0
      gpu_max: 100
      memory_min: 0
      memory_max: 100
      burst_period_sec: 30

  # Opt-in simulation of GPU failure scenarios: lost device, fallen-off-bus,
  # uncorrectable ECC errors, and Xid critical events. When `enabled: false`
  # (the default) the rendered ConfigMap is unchanged and the mock reports
  # healthy hardware.
  #
  # See pkg/gpu/mocknvml/README.md#failure-injection-optional for the full
  # behavioural contract per mode.
  failureInjection:
    enabled: false
    mode: healthy                        # healthy (no-op) | lost | fallen_off_bus | ecc_uncorrectable
    probability: 0.0                     # 0..1 chance per guarded NVML call
    after_calls: 0                       # deterministic trip after N guarded calls (0 = disabled)
    seed: 0                              # 0 = time-based; non-zero for reproducible rolls
    xid:
      code: 0                            # 0 = no Xid surfaced; e.g. 79 = "GPU has fallen off the bus"

image:
  repository: ghcr.io/nvidia/nvml-mock
  tag: latest
  pullPolicy: IfNotPresent

driverVersion: ""                  # Auto-derived from profile. Override: "550.163.01"

nodeSelector: {}
tolerations:
  - operator: Exists

resources: {}

# DaemonSet rolling update strategy. nvml-mock is a stateless mock
# driver, so the default is to roll every pod in parallel
# (maxUnavailable: 100%) — config changes propagate in seconds rather
# than O(nodes) seconds. Override to tighten the blast radius if you
# need the upstream DaemonSet default behaviour.
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 100%

# Integration with external projects
integrations:
  fakeGpuOperator:
    enabled: false
    # Labels applied to per-profile ConfigMaps for discovery
    profileLabels:
      run.ai/gpu-profile: "true"
