suite: NRI DaemonSet
templates:
  - templates/nri-daemonset.yaml
chart:
  version: 0.0.0-tests
  appVersion: 0.0.0-tests
tests:
  - it: should not render by default (opt-in feature)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render an NRI DaemonSet when enabled
    set:
      nri:
        enabled: true
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nvml-mock-nri
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: nvml-mock-nri
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: nvml-mock-nri
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: nvml-mock-nri
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: nri
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/nvidia/nvml-mock:0.0.0-tests
      - contains:
          path: spec.template.spec.containers[0].args
          content: --socket-path=/var/run/nri/nri.sock
      - contains:
          path: spec.template.spec.containers[0].args
          content: --excluded-namespaces=NAMESPACE,kube-system
      - contains:
          path: spec.template.spec.containers[0].args
          content: --node-name=$(NODE_NAME)
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName

  - it: should inherit an explicit root image tag before appVersion
    set:
      image:
        tag: root-override
      nri:
        enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/nvidia/nvml-mock:root-override

  - it: should treat an empty NRI tag as absent and inherit the root tag
    set:
      image:
        tag: root-override
      nri:
        enabled: true
        image:
          tag: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/nvidia/nvml-mock:root-override

  - it: should prefer an explicit NRI image tag over the root tag
    set:
      image:
        tag: root-override
      nri:
        enabled: true
        image:
          tag: nri-override
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/nvidia/nvml-mock:nri-override

  - it: should mount the NRI socket directory and overlay host path
    set:
      nri:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: nri-socket-dir
            hostPath:
              path: /var/run/nri
              type: DirectoryOrCreate
      - contains:
          path: spec.template.spec.volumes
          content:
            name: nvml-mock-overlay
            hostPath:
              path: /var/lib/nvml-mock
              type: DirectoryOrCreate
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: nvml-mock-overlay
            mountPath: /var/lib/nvml-mock
            readOnly: true

  - it: should apply custom NRI image and resources
    set:
      nri:
        enabled: true
        image:
          repository: custom/nvml-mock-nri
          tag: v1
          pullPolicy: Always
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom/nvml-mock-nri:v1
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 10m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 32Mi

  - it: should pass custom overlay and namespace exclusions
    set:
      nri:
        enabled: true
        socketPath: /run/custom-nri/nri.sock
        overlay:
          hostPath: /custom/nvml-mock
          mountPath: /mock
        excludedNamespaces:
          - monitoring
          - gpu-system
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --socket-path=/run/custom-nri/nri.sock
      - contains:
          path: spec.template.spec.containers[0].args
          content: --overlay-host-path=/custom/nvml-mock
      - contains:
          path: spec.template.spec.containers[0].args
          content: --overlay-mount-path=/mock
      - contains:
          path: spec.template.spec.containers[0].args
          content: --excluded-namespaces=NAMESPACE,kube-system,monitoring,gpu-system
