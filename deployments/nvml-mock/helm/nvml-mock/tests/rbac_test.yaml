suite: RBAC
templates:
  - templates/rbac.yaml
chart:
  version: 0.0.0-tests
  appVersion: 0.0.0-tests
tests:
  # ── Snapshots ───────────────────────────────────────────────────────
  - it: should match ServiceAccount snapshot
    documentIndex: 0
    asserts:
      - matchSnapshot: {}

  - it: should match ClusterRole snapshot
    documentIndex: 1
    asserts:
      - matchSnapshot: {}

  - it: should match ClusterRoleBinding snapshot
    documentIndex: 2
    asserts:
      - matchSnapshot: {}

  # ── ServiceAccount ──────────────────────────────────────────────────
  - it: should create a ServiceAccount
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nvml-mock

  - it: should include standard labels on ServiceAccount
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: nvml-mock-0.0.0-tests
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: nvml-mock
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  # ── ClusterRole ─────────────────────────────────────────────────────
  - it: should create a ClusterRole
    documentIndex: 1
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nvml-mock

  - it: should grant get and patch on nodes
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["nodes"]
            verbs: ["get", "patch"]

  - it: should include standard labels on ClusterRole
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: nvml-mock-0.0.0-tests
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: nvml-mock

  # ── ClusterRoleBinding ──────────────────────────────────────────────
  - it: should create a ClusterRoleBinding
    documentIndex: 2
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nvml-mock

  - it: should bind to the correct ClusterRole
    documentIndex: 2
    asserts:
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-nvml-mock

  - it: should reference the correct ServiceAccount subject
    documentIndex: 2
    asserts:
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: RELEASE-NAME-nvml-mock
            namespace: NAMESPACE

  - it: should include standard labels on ClusterRoleBinding
    documentIndex: 2
    asserts:
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: nvml-mock-0.0.0-tests
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: nvml-mock

  # ── Name overrides ─────────────────────────────────────────────────
  - it: should respect fullnameOverride across all RBAC resources
    set:
      fullnameOverride: custom-rbac
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: custom-rbac

  - it: should respect fullnameOverride on ClusterRole
    set:
      fullnameOverride: custom-rbac
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: custom-rbac

  - it: should respect fullnameOverride on ClusterRoleBinding
    set:
      fullnameOverride: custom-rbac
    documentIndex: 2
    asserts:
      - equal:
          path: metadata.name
          value: custom-rbac
      - equal:
          path: roleRef.name
          value: custom-rbac
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: custom-rbac
            namespace: NAMESPACE

  - it: should use release namespace for the ServiceAccount subject
    release:
      namespace: gpu-system
    documentIndex: 2
    asserts:
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: RELEASE-NAME-nvml-mock
            namespace: gpu-system
