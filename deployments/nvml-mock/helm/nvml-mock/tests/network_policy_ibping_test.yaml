suite: IB ping NetworkPolicy
templates:
  - templates/network-policy-ibping.yaml
tests:
  - it: should render a NetworkPolicy by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nvml-mock-ibping
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: nvml-mock
      # The policy must NOT select the injector pod (it shares name/instance
      # labels): otherwise its ingress is restricted to the ibping port and the
      # admission webhook's :8443 endpoint is silently blocked.
      - equal:
          path: spec.podSelector.matchExpressions[0].key
          value: app.kubernetes.io/component
      - equal:
          path: spec.podSelector.matchExpressions[0].operator
          value: NotIn
      - contains:
          path: spec.podSelector.matchExpressions[0].values
          content: injector
      - contains:
          path: spec.policyTypes
          content: Ingress
      - equal:
          path: spec.ingress[0].from[0].podSelector.matchLabels["app.kubernetes.io/name"]
          value: nvml-mock
      # namespaceSelector + podSelector in one peer (AND) admits nvml-mock
      # pods in any namespace, so a cross-namespace fleet isn't dropped on
      # enforcing CNIs.
      - exists:
          path: spec.ingress[0].from[0].namespaceSelector
      - equal:
          path: spec.ingress[0].ports[0].port
          value: ibping
      - equal:
          path: spec.ingress[0].ports[0].protocol
          value: TCP

  - it: should not render when disabled
    set:
      infiniband:
        ping:
          networkPolicy:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render for profiles without InfiniBand
    set:
      gpu:
        profile: t4
    asserts:
      - hasDocuments:
          count: 0
