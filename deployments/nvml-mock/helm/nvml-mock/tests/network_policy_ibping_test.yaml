suite: IB ping NetworkPolicy
templates:
  - templates/network-policy-ibping.yaml
tests:
  - it: should render a NetworkPolicy by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nvml-mock-ibping
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: nvml-mock
      - contains:
          path: spec.policyTypes
          content: Ingress
      - equal:
          path: spec.ingress[0].from[0].podSelector.matchLabels["app.kubernetes.io/name"]
          value: nvml-mock
      # namespaceSelector + podSelector in one peer (AND) admits nvml-mock
      # pods in any namespace, so a cross-namespace fleet isn't dropped on
      # enforcing CNIs.
      - exists:
          path: spec.ingress[0].from[0].namespaceSelector
      - equal:
          path: spec.ingress[0].ports[0].port
          value: ibping
      - equal:
          path: spec.ingress[0].ports[0].protocol
          value: TCP
      # With the RDMA data path enabled (the default), the policy must also
      # admit perftest's out-of-band sync port so the cross-pod handshake is
      # not dropped on policy-enforcing CNIs (kindnet >= kind v0.24.0, Calico,
      # Cilium). See issue #374.
      - equal:
          path: spec.ingress[0].ports[1].port
          value: 18516
      - equal:
          path: spec.ingress[0].ports[1].protocol
          value: TCP

  - it: should omit the RDMA OOB port when the data path is disabled
    set:
      infiniband:
        rdma:
          enabled: false
    asserts:
      # Only the fabric port remains; no perftest OOB port is admitted.
      - lengthEqual:
          path: spec.ingress[0].ports
          count: 1
      - equal:
          path: spec.ingress[0].ports[0].port
          value: ibping

  - it: should admit a custom RDMA OOB port
    set:
      infiniband:
        rdma:
          oobPort: 29000
    asserts:
      - equal:
          path: spec.ingress[0].ports[1].port
          value: 29000

  - it: should not render when disabled
    set:
      infiniband:
        ping:
          networkPolicy:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render for profiles without InfiniBand
    set:
      gpu:
        profile: t4
    asserts:
      - hasDocuments:
          count: 0
