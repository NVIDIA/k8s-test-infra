suite: IB ping Service
templates:
  - templates/service-ibping.yaml
chart:
  version: 0.0.0-tests
  appVersion: 0.0.0-tests
tests:
  - it: should render a headless Service
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nvml-mock-ibping
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: nvml-mock
      # Scoped to the daemon component so the NRI DaemonSet pods (same app
      # name, no fabric listener) are never returned as fabric peers.
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: daemon
      - notExists:
          path: spec.selector["app.kubernetes.io/instance"]
      - equal:
          path: spec.ports[0].name
          value: ibping
      - equal:
          path: spec.ports[0].port
          value: 18515
      - equal:
          path: spec.ports[0].targetPort
          value: ibping
      - equal:
          path: spec.ports[0].protocol
          value: TCP

  - it: should use a custom ping port
    set:
      infiniband:
        ping:
          port: 19000
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 19000

  - it: should not render for profiles without InfiniBand
    set:
      gpu:
        profile: t4
    asserts:
      - hasDocuments:
          count: 0
