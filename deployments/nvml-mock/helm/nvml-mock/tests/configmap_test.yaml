#
# After modifying GPU profiles, regenerate snapshots:
#   helm unittest -u deployments/nvml-mock/helm/nvml-mock
suite: ConfigMap
templates:
  - templates/configmap.yaml
chart:
  version: 0.0.0-tests
  appVersion: 0.0.0-tests
tests:
  # ── Snapshots ───────────────────────────────────────────────────────
  - it: should match snapshot with default a100 profile
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot with h100 profile
    set:
      gpu:
        profile: h100
        count: 8
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot with b200 profile
    set:
      gpu:
        profile: b200
        count: 8
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot with gb200 profile
    set:
      gpu:
        profile: gb200
        count: 8
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot with gb300 profile
    set:
      gpu:
        profile: gb300
        count: 8
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot with l40s profile
    set:
      gpu:
        profile: l40s
        count: 8
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot with t4 profile
    set:
      gpu:
        profile: t4
        count: 8
    asserts:
      - matchSnapshot: {}

  # ── Assertions ──────────────────────────────────────────────────────
  - it: should render a ConfigMap with default values
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nvml-mock-config

  - it: should include standard labels
    asserts:
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: nvml-mock-0.0.0-tests
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: nvml-mock
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should contain config.yaml data key
    asserts:
      - exists:
          path: data["config.yaml"]

  - it: should load a100 profile by default
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "NVIDIA A100-SXM4-40GB"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "architecture: .ampere."

  - it: should load h100 profile
    set:
      gpu:
        profile: h100
        count: 8
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "NVIDIA H100"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "architecture: .hopper."

  - it: should load b200 profile
    set:
      gpu:
        profile: b200
        count: 8
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "NVIDIA B200"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "architecture: .blackwell."

  - it: should load gb200 profile
    set:
      gpu:
        profile: gb200
        count: 8
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "NVIDIA GB200"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "architecture: .blackwell."

  - it: should load gb300 profile
    set:
      gpu:
        profile: gb300
        count: 8
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "NVIDIA GB300"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "architecture: .blackwell."

  - it: should load l40s profile
    set:
      gpu:
        profile: l40s
        count: 8
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "NVIDIA L40S"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "architecture: .ada.lovelace."

  - it: should load t4 profile
    set:
      gpu:
        profile: t4
        count: 8
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "NVIDIA T4"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "architecture: .turing."

  - it: should use customConfig when provided
    set:
      gpu:
        profile: a100
        count: 2
        customConfig: |
          version: "1.0"
          system:
            driver_version: "custom"
          device_defaults:
            name: "Custom GPU"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "Custom GPU"
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'driver_version: .custom.'

  - it: should prefer customConfig over profile
    set:
      gpu:
        profile: h100
        count: 1
        customConfig: |
          version: "1.0"
          device_defaults:
            name: "Override GPU"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "Override GPU"

  - it: should fail for unknown profile
    set:
      gpu:
        profile: invalid-gpu
        count: 1
    asserts:
      - failedTemplate:
          errorMessage: 'Unknown GPU profile "invalid-gpu": profiles/invalid-gpu.yaml not found in chart. Available profiles: a100, b200, gb200, gb300, h100, l40s, t4. Or set gpu.customConfig with inline YAML.'

  - it: should respect fullnameOverride in ConfigMap name
    set:
      fullnameOverride: custom-cm
    asserts:
      - equal:
          path: metadata.name
          value: custom-cm-config

  # ── Dynamic metrics ─────────────────────────────────────────────────
  - it: should not emit dynamic_metrics block when feature is disabled (default)
    asserts:
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "dynamic_metrics:"

  - it: should inject dynamic_metrics under device_defaults when enabled
    set:
      gpu:
        dynamicMetrics:
          enabled: true
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "dynamic_metrics:"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "pattern: burst"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_mw: 250000"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_c: 55"

  - it: should respect per-field overrides when dynamic_metrics is enabled
    set:
      gpu:
        dynamicMetrics:
          enabled: true
          seed: 42
          temperature:
            base_c: 70
            variance_c: 2
          power:
            base_mw: 300000
            variance_mw: 10000
          utilization:
            pattern: idle
            gpu_min: 0
            gpu_max: 50
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "seed: 42"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_c: 70"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_mw: 300000"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "pattern: idle"

  - it: should use the profile power default over the chart baseline (b200)
    set:
      gpu:
        profile: b200
        dynamicMetrics:
          enabled: true
    asserts:
      # b200's [400W, 1200W] envelope excludes the 250W chart baseline, so the
      # profile default (600W) must win — otherwise power clamps to a constant.
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_mw: 600000"
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "base_mw: 250000"
      # Non-power fields still come from the chart baseline.
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_c: 55"

  - it: should use the profile power default over the chart baseline (t4)
    set:
      gpu:
        profile: t4
        dynamicMetrics:
          enabled: true
    asserts:
      # t4's 70W ceiling is below the 250W baseline; profile default (65W) wins.
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_mw: 65000"

  - it: should let a user override win over the profile power default
    set:
      gpu:
        profile: b200
        dynamicMetrics:
          enabled: true
          power:
            base_mw: 900000
    asserts:
      # User-supplied value beats both the profile default (600W) and baseline.
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_mw: 900000"
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "base_mw: 600000"
      # variance_mw was not overridden, so it falls back to the profile default.
      - matchRegex:
          path: data["config.yaml"]
          pattern: "variance_mw: 50000"

  - it: should fall back to the chart baseline power for profiles without a default (a100)
    set:
      gpu:
        profile: a100
        dynamicMetrics:
          enabled: true
    asserts:
      # a100's [100W, 400W] window contains the 250W baseline, so no per-profile
      # override is needed and the baseline is used verbatim.
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_mw: 250000"

  - it: should not emit the dynamicMetrics 'enabled' flag into the rendered config
    set:
      gpu:
        dynamicMetrics:
          enabled: true
    asserts:
      # `enabled` is a helm-level toggle; it must not leak into the mock
      # NVML YAML since DynamicMetricsConfig has no corresponding field.
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "^ *enabled:"

  - it: should overlay dynamic_metrics on top of gpu.customConfig when enabled
    set:
      gpu:
        profile: a100
        count: 1
        customConfig: |
          version: "1.0"
          system:
            driver_version: "custom"
          device_defaults:
            name: "Custom GPU"
            thermal:
              temperature_gpu_c: 40
        dynamicMetrics:
          enabled: true
          temperature:
            base_c: 88
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "Custom GPU"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "temperature_gpu_c: 40"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "dynamic_metrics:"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "base_c: 88"

  # ── Failure injection ───────────────────────────────────────────────
  - it: should not emit failure block when failure injection is disabled (default)
    asserts:
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "^[[:space:]]*failure:"

  - it: should inject failure block under device_defaults when enabled
    set:
      gpu:
        failureInjection:
          enabled: true
          mode: lost
          after_calls: 100
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "failure:"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "mode: lost"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "after_calls: 100"

  - it: should respect per-field overrides when failure injection is enabled
    set:
      gpu:
        failureInjection:
          enabled: true
          mode: ecc_uncorrectable
          probability: 0.25
          after_calls: 500
          seed: 12345
          xid:
            code: 64
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "mode: ecc_uncorrectable"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "probability: 0.25"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "after_calls: 500"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "seed: 12345"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "code: 64"

  - it: should not emit the failureInjection 'enabled' flag into the rendered config
    set:
      gpu:
        failureInjection:
          enabled: true
          mode: lost
    asserts:
      # `enabled` is a helm-level toggle; it must not leak into the mock
      # NVML YAML since FailureInjectionConfig has no corresponding field.
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "^ *enabled:"

  - it: should support enabling dynamic_metrics and failure injection together
    set:
      gpu:
        dynamicMetrics:
          enabled: true
        failureInjection:
          enabled: true
          mode: fallen_off_bus
          after_calls: 50
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "dynamic_metrics:"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "failure:"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "mode: fallen_off_bus"

  # values.schema.json now blocks bad failureInjection values at install
  # time so a typo like `mode: healhty` or `probability: 1.5` fails fast
  # instead of silently coercing to "healthy" / out-of-range behavior at
  # runtime. These cases exercise the schema gate.
  - it: should reject failureInjection.mode outside the supported enum
    set:
      gpu:
        failureInjection:
          enabled: true
          mode: healhty                  # typo — must be rejected by schema
    asserts:
      - failedTemplate:
          errorMessage: "values don't meet the specifications of the schema(s) in the following chart(s):\nnvml-mock:\n- at '/gpu/failureInjection/mode': value must be one of 'healthy', 'lost', 'fallen_off_bus', 'ecc_uncorrectable'\n"

  - it: should reject failureInjection.probability outside [0, 1]
    set:
      gpu:
        failureInjection:
          enabled: true
          mode: lost
          probability: 1.5
    asserts:
      - failedTemplate:
          errorMessage: "values don't meet the specifications of the schema(s) in the following chart(s):\nnvml-mock:\n- at '/gpu/failureInjection/probability': maximum: got 1.5, want 1\n"

  - it: should reject negative failureInjection.after_calls
    set:
      gpu:
        failureInjection:
          enabled: true
          mode: lost
          after_calls: -1
    asserts:
      - failedTemplate:
          errorMessage: "values don't meet the specifications of the schema(s) in the following chart(s):\nnvml-mock:\n- at '/gpu/failureInjection/after_calls': minimum: got -1, want 0\n"
