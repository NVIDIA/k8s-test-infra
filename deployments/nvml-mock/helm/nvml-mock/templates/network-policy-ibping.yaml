{{- if and .Values.infiniband.ping.networkPolicy.enabled (eq (include "nvml-mock.infinibandEnabled" .) "true") }}
# The mock-ib TCP fabric listener binds 0.0.0.0:{{ .Values.infiniband.ping.port }}
# with no authentication, and the DaemonSet runs privileged. This policy
# limits the blast radius by allowing inbound fabric traffic only from peer
# nvml-mock pods (the only legitimate clients). Egress is left unrestricted
# so DNS-based peer discovery and registration keep working.
#
# NOTE: NetworkPolicy is enforced by CNIs that implement it (Calico, Cilium,
# and recent kindnet). On CNIs that ignore it this is a no-op; either way it is
# scoped to the mock-ib fabric DaemonSet pods only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nvml-mock.fullname" . }}-ibping
  labels:
    {{- include "nvml-mock.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nvml-mock.selectorLabels" . | nindent 6 }}
    # Exclude the injector Deployment: it shares the name/instance selector
    # labels but is NOT a fabric pod. Selecting it here would restrict its
    # ingress to the ibping port only, silently blocking the admission
    # webhook's :8443 endpoint (the API server call fails open, so no pod ever
    # gets injected). The fabric DaemonSet pods carry no component label.
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: NotIn
        values:
          - injector
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Match by app name only (not instance): the fabric spans every
        # nvml-mock pod cluster-wide, which may be deployed as multiple Helm
        # releases (e.g. one per node in the ibping-multinode e2e). Scoping to
        # the release's own instance would block cross-release registration.
        #
        # The namespaceSelector and podSelector are combined in a single peer
        # (logical AND), so this admits nvml-mock pods in ANY namespace. Without
        # the namespaceSelector a bare podSelector only matches pods in this
        # policy's own namespace, which would silently drop REGISTER traffic for
        # a fleet split across namespaces on enforcing CNIs (Calico/Cilium).
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "nvml-mock.name" . }}
      ports:
        - port: ibping
          protocol: TCP
{{- end }}
