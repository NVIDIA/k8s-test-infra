apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nvml-mock.fullname" . }}
  labels:
    {{- include "nvml-mock.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "nvml-mock.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nvml-mock.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nvml-mock.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nvml-mock
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            privileged: true
          command: ["/scripts/entrypoint.sh"]
          env:
            - name: GPU_COUNT
              value: "{{ .Values.gpu.count }}"
            - name: DRIVER_VERSION
              value: "{{ include "nvml-mock.driverVersion" . }}"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          lifecycle:
            preStop:
              exec:
                command: ["/scripts/cleanup.sh"]
          volumeMounts:
            - name: host-nvml-mock
              mountPath: /host/var/lib/nvml-mock
            - name: gpu-config
              mountPath: /config
            - name: host-cdi
              mountPath: /host/var/run/cdi
            - name: host-run-nvidia
              mountPath: /host/run/nvidia
      volumes:
        - name: host-nvml-mock
          hostPath:
            path: /var/lib/nvml-mock
            type: DirectoryOrCreate
        - name: gpu-config
          configMap:
            name: {{ include "nvml-mock.fullname" . }}-config
        - name: host-cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
        - name: host-run-nvidia
          hostPath:
            path: /run/nvidia
            type: DirectoryOrCreate
