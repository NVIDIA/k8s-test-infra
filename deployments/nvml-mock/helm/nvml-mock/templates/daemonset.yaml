apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nvml-mock.fullname" . }}
  labels:
    {{- include "nvml-mock.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "nvml-mock.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "nvml-mock.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the DaemonSet on any config.yaml change.
        checksum/config: {{ include "nvml-mock.gpuConfig" . | sha256sum }}
    spec:
      serviceAccountName: {{ include "nvml-mock.fullname" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nvml-mock
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            privileged: true
          ports:
            - name: ibping
              containerPort: {{ .Values.infiniband.ping.port }}
              protocol: TCP
          command: ["/scripts/entrypoint.sh"]
          env:
            - name: GPU_COUNT
              value: "{{ .Values.gpu.count }}"
            - name: DRIVER_VERSION
              value: "{{ include "nvml-mock.driverVersion" . }}"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Point the mock NVML library at the in-pod ConfigMap mount so any
            # nvidia-smi / NVML caller running INSIDE the daemonset pod
            # (e.g. `kubectl exec ds/nvml-mock -- nvidia-smi`) loads the same
            # GPU profile as the host driver root. Without this the loader
            # falls back to "no-YAML" defaults and reports values as N/A.
            #
            # The path is /etc/nvml-mock/config.yaml here AND in the CDI spec
            # generated by setup.sh, so consumers (daemonset, CDI-injected
            # workloads) all see the config at the same in-container location.
            - name: MOCK_NVML_CONFIG
              value: /etc/nvml-mock/config.yaml
            {{- if .Values.topology.enabled }}
            # Point the engine's topology overlay at the in-pod mount of
            # the cluster-level topology ConfigMap. See
            # pkg/gpu/mocknvml/engine/config.go applyTopologyOverlay().
            - name: MOCK_TOPOLOGY_CONFIG
              value: /etc/nvml-mock/topology/topology.yaml
            {{- end }}
            {{- if .Values.imex.enabled }}
            # Shared coordination directory for the fake nvidia-imex /
            # nvidia-imex-ctl binaries baked into this image. The same
            # hostPath is bind-mounted into compute-domain-daemon pods
            # via the thin image layer in
            # deployments/nvml-mock/Dockerfile.compute-domain-daemon.
            - name: IMEX_STATE_DIR
              value: {{ .Values.imex.stateDir }}
            {{- end }}
            # Enable mock-ib (started by setup.sh) and TCP fabric relay
            # between nvml-mock pods so `ibping` can reach peers cluster-wide.
            - name: MOCK_IB_PING
              value: "1"
            - name: MOCK_IB_PING_FABRIC
              value: "1"
            - name: MOCK_IB_PING_PORT
              value: "{{ .Values.infiniband.ping.port }}"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MOCK_IB_PING_SERVICE_HOST
              value: "{{ include "nvml-mock.fullname" . }}-ibping.{{ .Release.Namespace }}.svc.cluster.local"
            # LD_PRELOAD installs the InfiniBand sysfs redirector in every
            # process spawned in this container (e.g. `kubectl exec ibstat`).
            # The shim only rewrites paths under /sys/class/infiniband*,
            # /sys/class/infiniband_mad/, /sys/class/infiniband_verbs/ and
            # /dev/infiniband — every other path passes through unchanged.
            # libibmockumad must precede libibmocksys so UMAD ioctls are
            # intercepted before sysfs path rewriting.
            - name: LD_PRELOAD
              value: "/usr/local/lib/libibmockumad.so.1:/usr/local/lib/libibmocksys.so.1"
            - name: MOCK_IB_ROOT
              value: "/var/lib/nvml-mock/ib"
          lifecycle:
            preStop:
              exec:
                command: ["/scripts/cleanup.sh"]
          volumeMounts:
            - name: host-nvml-mock
              mountPath: /host/var/lib/nvml-mock
            # Second mount of the same hostPath volume at the canonical path
            # so MOCK_IB_ROOT=/var/lib/nvml-mock/ib resolves identically in
            # this pod and in CDI-injected consumer pods. Mounting one
            # volume at multiple mountPaths in a single container is
            # standard k8s behavior (supported on every version covered
            # by Chart.yaml's kubeVersion: ">= 1.28.0-0").
            - name: host-nvml-mock
              mountPath: /var/lib/nvml-mock
            - name: gpu-config
              mountPath: /etc/nvml-mock
            - name: host-cdi
              mountPath: /host/var/run/cdi
            - name: host-run-nvidia
              mountPath: /host/run/nvidia
            {{- if .Values.topology.enabled }}
            - name: gpu-topology
              mountPath: /etc/nvml-mock/topology
            {{- end }}
            {{- if .Values.imex.enabled }}
            - name: host-imex-state
              mountPath: {{ .Values.imex.stateDir }}
            {{- end }}
      volumes:
        - name: host-nvml-mock
          hostPath:
            path: /var/lib/nvml-mock
            type: DirectoryOrCreate
        - name: gpu-config
          configMap:
            name: {{ include "nvml-mock.fullname" . }}-config
        - name: host-cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
        - name: host-run-nvidia
          hostPath:
            path: /run/nvidia
            type: DirectoryOrCreate
        {{- if .Values.topology.enabled }}
        - name: gpu-topology
          configMap:
            name: {{ include "nvml-mock.fullname" . }}-topology
        {{- end }}
        {{- if .Values.imex.enabled }}
        - name: host-imex-state
          hostPath:
            path: {{ .Values.imex.stateDir }}
            type: DirectoryOrCreate
        {{- end }}
