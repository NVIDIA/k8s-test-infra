{{- if .Values.injector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nvml-mock.fullname" . }}-injector
  labels:
    {{- include "nvml-mock.labels" . | nindent 4 }}
    app.kubernetes.io/component: injector
spec:
  selector:
    {{- include "nvml-mock.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: injector
  ports:
    - name: webhook
      port: 443
      targetPort: webhook
      protocol: TCP
{{- end }}
