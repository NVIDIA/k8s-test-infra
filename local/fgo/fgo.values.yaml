#
# FGO topology matching the default cluster workers.
# integration: real worker (a100) — nvml-mock provides the NVML shim.
# scale:       real worker (t4)   — FGO fake backend, no nvml-mock required.
topology:
  nodePools:
    integration:
      backend: mock
      gpuCount: 8
      gpuProfile: a100
    scale:
      backend: fake
      gpuCount: 4
      gpuProfile: t4
