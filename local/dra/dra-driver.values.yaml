#
# Helm values for nvidia-dra-driver-gpu when running against nvml-mock in the
# 'dra' local dev scenario.
#
# Usage (via Tilt):
#   tilt up -- --scenario dra
#
# Prerequisites:
#   - Cluster created with DRA feature gates (make cluster-create).
#   - nvml-mock deployed first (Tilt handles ordering via resource_deps).
#
# Mirrors the DRA driver install used by the CI e2e-dra job
# (.github/workflows/nvml-mock-e2e.yaml).

# Point the DRA kubelet plugin at the mock driver tree instead of "/".
# The mock DaemonSet lays down libnvidia-ml.so, device nodes, and nvidia-smi
# under this path — see deployments/nvml-mock/scripts/setup.sh, which
# co-locates $DEV_ROOT under $DRIVER_ROOT specifically so getDevRoot() in
# the upstream DRA driver resolves here rather than falling back to "/".
nvidiaDriverRoot: /var/lib/nvml-mock/driver

# Force-enable GPU resources without waiting for NFD to detect real hardware.
# The mock advertises fake GPUs via labels, but the DRA driver's default
# gating expects NFD-detected physical NVIDIA devices.
gpuResourcesEnabledOverride: true

# Compute Domains (IMEX / fabricmanager coordination) is not exercised by the
# mock in the default local dev flow. Keep it off to avoid extra pods on the
# single-node kind cluster. Enable if you're specifically iterating on IMEX.
resources:
  computeDomains:
    enabled: false
