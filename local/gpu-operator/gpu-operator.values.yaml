#
# GPU Operator Helm values overlay for the gpu-operator local dev scenario.
#
# Usage (via Tilt):
#   tilt up -- --gpu-operator
#
# Prerequisites:
#   - make cluster-create
#   - nvml-mock deployed first (Tilt handles ordering via resource_deps)

# Driver is replaced by nvml-mock chart — no real kernel module needed.
driver:
  enabled: false

# Container toolkit is not needed — the mock libs are placed on the host
# by the nvml-mock DaemonSet, not injected by the toolkit.
toolkit:
  enabled: false

# DCGM is not supported by the mock NVML (requires full driver stack).
dcgm:
  enabled: false

dcgmExporter:
  enabled: false

# MIG is not supported by the mock NVML — disable manager and set strategy to none.
# Without this, the device-plugin enumerates MIG devices and the CDI spec generator
# treats any non-NOT_FOUND return as fatal (the mock now returns NOT_FOUND).
mig:
  strategy: none
migManager:
  enabled: false

# Node status exporter depends on DCGM — disable.
nodeStatusExporter:
  enabled: false

# CDI mode — the toolkit reads /var/run/cdi/nvidia.yaml generated by nvml-mock.
cdi:
  enabled: true
  default: true

# Device plugin discovers GPUs via mock NVML.
devicePlugin:
  enabled: true
  config:
    name: ""
  env:
    - name: NVIDIA_DRIVER_ROOT
      value: "/var/lib/nvml-mock/driver"

# GFD reads GPU attributes via mock NVML and labels the node.
gfd:
  enabled: true
  env:
    - name: NVIDIA_DRIVER_ROOT
      value: "/var/lib/nvml-mock/driver"

# Validator checks that the GPU stack is functional.
#
# driver-validation passes: it finds nvidia-smi via DRIVER_INSTALL_DIR and loads
# libnvidia-ml.so via LD_LIBRARY_PATH, both pointing at the mock driver root.
# DISABLE_DEV_CHAR_SYMLINK_CREATION=true is required because the /dev/char symlink
# step tries modprobe nvidia which fails in a Kind container.
#
# toolkit-validation passes: nvidia-container-runtime (pre-baked in the custom
# Kind node image) intercepts NVIDIA_VISIBLE_DEVICES=all, performs CDI injection
# using /var/run/cdi/nvidia.yaml written by nvml-mock, and nvidia-smi is found.
validator:
  driver:
    env:
      - name: DRIVER_INSTALL_DIR
        value: "/run/nvidia/driver"
      - name: LD_LIBRARY_PATH
        value: "/run/nvidia/driver/usr/lib64"
      - name: DISABLE_DEV_CHAR_SYMLINK_CREATION
        value: "true"
  toolkit:
    env:
      - name: NVIDIA_VISIBLE_DEVICES
        value: "all"
  cuda:
    env:
      - name: WITH_WORKLOAD
        value: "false"
  plugin:
    env:
      - name: LD_LIBRARY_PATH
        value: "/run/nvidia/driver/usr/lib64"
